<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Blue Lock: Nagi's Heart · 梦向乙游</title>
<style>
  :root{
    --cream:#fdf6f6; --peach:#f8dfe0; --peachD:#e8b4b6;
    --gold:#d4879a; --goldD:#b86b7e; --goldL:#e8a8b6;
    --rose:#c25670; --roseL:#d87a90;
    --ink:#5a3040; --ink2:#967080; --white:#fff8f8;
    --line:rgba(210,120,140,.35);
    --glass:rgba(255,245,248,.65);
    --glass2:rgba(255,240,244,.78);
    --glassBorder:rgba(255,255,255,.55);
    --shadow:rgba(180,80,100,.18);
    --serif:"Baskerville","Songti SC","Times New Roman",Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:#e8c4ca;color:var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .game{position:relative;width:100%;max-width:460px;height:100dvh;max-height:940px;
    overflow:hidden;background:var(--cream);box-shadow:0 0 80px rgba(180,80,100,.35);}

  /* 背景图层 */
  .bg{position:absolute;inset:0;background:url("home2.png") center top/cover no-repeat;}
  /* 游戏内背景：直接裁剪铺满（清晰、占屏，顶部对齐保面部） */
  .gbg{position:absolute;inset:0;background-position:center top;background-size:cover;background-repeat:no-repeat;}
  .gbgfront{display:none;}
  .bg.blur{filter:blur(11px) brightness(1.04) saturate(1.05);transform:scale(1.12);}
  .bg.soft{filter:blur(3px) brightness(1.02);transform:scale(1.06);}
  .veil{position:absolute;inset:0;}
  .veil.light{background:linear-gradient(180deg,rgba(253,240,244,.35),rgba(248,220,226,.5));}
  .veil.read{background:linear-gradient(180deg,rgba(253,240,244,.5),rgba(240,200,210,.55));}
  .veil.game{background:linear-gradient(180deg,transparent 36%,rgba(253,240,244,.14) 64%,rgba(248,220,226,.38));}

  /* 花瓣 */
  #petals{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden}
  .petal{position:absolute;top:-24px;width:14px;height:14px;border-radius:60% 0 60% 0;
    background:radial-gradient(circle at 30% 30%,#ffd6e0,#f0a0b8);opacity:.7;
    animation:fall linear infinite;}
  @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:0}
    10%{opacity:.8}100%{transform:translateY(106vh) rotate(360deg);opacity:.2}}

  /* 通用全屏页 */
  .screen{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;animation:fade .5s ease;}
  .hidden{display:none!important}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* 装饰分隔 */
  .orn{display:flex;align-items:center;gap:10px;color:var(--gold);font-size:13px;letter-spacing:.2em}
  .orn::before,.orn::after{content:"";width:40px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent)}

  /* ===== 主页 ===== */
  #home .start{position:absolute;bottom:6%;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:0;cursor:pointer;
    transition:transform .2s}
  #home .start:active{transform:scale(.96)}
  #home .startword{font-family:var(--serif);font-size:30px;letter-spacing:.3em;font-weight:600;
    color:#fff;min-height:42px;display:flex;align-items:center;justify-content:center;gap:10px;
    text-shadow:0 2px 16px rgba(194,86,112,.55),0 0 36px rgba(255,220,230,.7),0 0 6px rgba(255,255,255,.9)}
  #home .startword::before,#home .startword::after{content:"✦";font-size:12px;color:rgba(255,255,255,.65);
    text-shadow:0 0 8px rgba(255,200,210,.6)}
  #home .startword .cur{color:var(--goldL);font-weight:400;margin-left:1px;animation:curblink .7s step-end infinite}
  @keyframes curblink{50%{opacity:0}}
  #home .starthint{font-size:11px;letter-spacing:.4em;color:rgba(255,255,255,.65);
    margin-top:5px;text-shadow:0 1px 8px rgba(194,86,112,.4);animation:hintb 2s ease-in-out infinite}
  @keyframes hintb{0%,100%{opacity:.3}50%{opacity:.8}}
  /* 存档记录入口（首页）*/
  #home .homesaves{position:absolute;bottom:5%;left:0;right:0;text-align:center;z-index:4;
    font-size:12px;letter-spacing:.22em;color:rgba(255,255,255,.7);cursor:pointer}
  #home .homesaves span{padding-bottom:2px}
  /* 存档卡片 */
  .savecard{position:relative;border-radius:18px;padding:13px 44px 13px 16px;text-align:left;
    border:none;background:var(--glass2);backdrop-filter:blur(12px);cursor:pointer;
    box-shadow:0 4px 16px var(--shadow);transition:transform .12s,box-shadow .12s}
  .savecard:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(180,80,100,.25)}
  .savecard .svtag{font-size:11px;letter-spacing:.18em;color:var(--goldD)}
  .savecard .svtit{font-family:var(--serif);font-size:16px;color:var(--rose);margin:3px 0 4px}
  .savecard .svmeta{font-size:11.5px;line-height:1.6;color:var(--ink2)}
  .savecard .savedel{position:absolute;top:50%;right:12px;transform:translateY(-50%);
    width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:var(--rose);background:rgba(194,86,112,.1);border:none}
  .saveempty{font-size:13px;color:var(--ink2);line-height:2;opacity:.85;margin-top:30px}
  /* 轻提示 */
  .toast{position:absolute;left:50%;top:18%;transform:translateX(-50%);z-index:30;
    background:rgba(90,48,64,.88);backdrop-filter:blur(8px);color:#fff;font-size:13px;letter-spacing:.05em;
    padding:9px 20px;border-radius:20px;box-shadow:0 8px 22px rgba(0,0,0,.2);
    opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}

  /* ===== 开场白 ===== */
  #prologue{cursor:pointer;padding:40px 34px}
  .pgtext{position:relative;z-index:3;
    font-family:var(--serif);font-size:21px;line-height:2.1;color:#8f2f3d;font-weight:600;
    width:min(330px,80%);min-height:112px;text-align:left;letter-spacing:.04em;
    opacity:0;transition:opacity 1s ease;
    text-shadow:0 0 5px rgba(255,255,255,.95),0 1px 2px rgba(255,255,255,.9),0 0 16px rgba(255,244,240,.8);}
  .pgtext.show{opacity:1}
  .pgtext .cur{color:var(--goldL);font-weight:400;margin-left:2px;animation:curblink .7s step-end infinite}
  #prologue .skip{position:absolute;bottom:26px;right:24px;font-size:12px;letter-spacing:.2em;
    color:var(--rose);border:none;border-radius:20px;padding:7px 16px;
    background:rgba(255,245,248,.55);backdrop-filter:blur(12px)}

  /* ===== 章节路线图 ===== */
  #map{justify-content:flex-start;}
  #map .maphead{position:absolute;top:0;left:0;right:0;z-index:3;padding:18px 0 14px;height:72px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    background:linear-gradient(180deg,rgba(253,246,246,.95) 58%,rgba(253,246,246,.85) 84%,transparent)}
  #map .maptitle{font-family:var(--serif);font-size:23px;color:var(--rose);letter-spacing:.08em;
    text-shadow:0 1px 0 #fff}
  .scroller{position:absolute;top:72px;bottom:62px;left:0;right:0;overflow-y:auto;z-index:2;padding:14px 0 18px;
    scrollbar-width:none;-ms-overflow-style:none}
  .game *::-webkit-scrollbar{width:0;height:0;display:none}
  .game *{scrollbar-width:none;-ms-overflow-style:none}
  .trail{position:relative;width:340px;margin:0 auto;}
  .trail svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .node{position:absolute;width:62px;height:62px;border-radius:50%;transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;
    background:rgba(255,240,244,.7);backdrop-filter:blur(10px);
    border:none;color:var(--rose);font-family:var(--serif);font-size:20px;font-weight:700;
    box-shadow:0 6px 20px var(--shadow);transition:transform .15s,box-shadow .2s}
  .node:hover{transform:translate(-50%,-50%) scale(1.08);box-shadow:0 8px 28px rgba(180,80,100,.3)}
  .node.locked{background:rgba(230,220,224,.5);
    color:#b8a0a8;cursor:not-allowed;box-shadow:0 4px 10px rgba(180,80,100,.08)}
  .node.locked:hover{transform:translate(-50%,-50%)}
  .node.done{color:var(--roseL)}
  .node.current{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 6px 20px var(--shadow),0 0 0 0 rgba(210,120,140,.4)}
    50%{box-shadow:0 6px 20px var(--shadow),0 0 0 12px rgba(210,120,140,0)}}
  .node .badge{position:absolute;top:-6px;right:-6px;font-size:13px}
  .nlabel{position:absolute;transform:translate(-50%,0);text-align:center;z-index:2;
    font-size:12px;color:var(--ink);width:120px;margin-top:6px;
    text-shadow:0 1px 0 rgba(255,255,255,.8);line-height:1.3}
  .nlabel b{display:block;font-size:11px;color:var(--goldD);letter-spacing:.1em}
  #map .mapfoot{position:absolute;bottom:0;left:0;right:0;z-index:3;display:flex;justify-content:center;
    padding:14px 0 16px;background:linear-gradient(0deg,rgba(253,246,246,.95) 50%,rgba(253,246,246,.85) 80%,transparent)}

  /* ===== 小节目录（二级页） ===== */
  #smap{justify-content:flex-start;}
  #smap .maphead{position:absolute;top:0;left:0;right:0;z-index:3;padding:18px 0 14px;height:88px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    background:linear-gradient(180deg,rgba(253,246,246,.95) 60%,rgba(253,246,246,.85) 85%,transparent)}
  #smap .smaptitle{font-family:var(--serif);font-size:22px;color:var(--rose);letter-spacing:.08em;text-shadow:0 1px 0 #fff}
  #smap .smapsub{font-size:12.5px;color:var(--ink2);letter-spacing:.18em}
  #smap .scroller{top:88px;bottom:20px;padding:12px 0 20px}
  #smap .backbtn{position:absolute;top:14px;left:12px;z-index:6;font-size:13px;color:var(--rose);
    background:rgba(255,245,248,.55);backdrop-filter:blur(10px);border:none;border-radius:18px;padding:7px 14px;
    cursor:pointer;box-shadow:0 3px 10px var(--shadow)}
  .seclist{width:344px;margin:0 auto;display:flex;flex-direction:column;gap:12px;padding:0 6px}
  .seccard{position:relative;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:18px;cursor:pointer;
    background:rgba(255,240,244,.6);backdrop-filter:blur(10px);
    border:none;box-shadow:0 4px 16px var(--shadow);
    transition:transform .12s,box-shadow .2s;animation:optIn .4s backwards}
  .seccard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(180,80,100,.25)}
  .seccard .sidx{flex:0 0 38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:17px;font-weight:700;color:var(--rose);
    background:rgba(255,245,248,.6);border:none}
  .seccard.done .sidx{color:var(--roseL)}
  .seccard .sbody{flex:1;text-align:left}
  .seccard .sn{font-size:11px;letter-spacing:.18em;color:var(--goldD)}
  .seccard .st{font-size:15px;color:var(--ink);margin-top:2px;line-height:1.35}
  .seccard .sck{font-size:17px;color:var(--gold)}
  .seccard.done .sck{color:var(--roseL)}

  /* ===== HUD ===== */
  .hud{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;gap:10px;padding:12px 14px;}
  .iconbtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    cursor:pointer;background:rgba(255,240,244,.45);backdrop-filter:blur(12px);border:none;
    box-shadow:0 2px 10px rgba(180,80,100,.25)}
  .iconbtn svg{width:17px;height:17px;stroke:var(--rose);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 1px 3px rgba(180,80,100,.3))}
  .hud .chiptitle{font-family:var(--serif);font-size:14px;color:var(--rose);
    background:rgba(255,240,244,.45);backdrop-filter:blur(12px);
    border:none;border-radius:18px;padding:5px 14px;box-shadow:0 2px 10px rgba(180,80,100,.25)}
  .hud .sp{flex:1}
  .bondwrap{display:flex;align-items:center;gap:6px;
    background:rgba(255,240,244,.45);backdrop-filter:blur(12px);
    border:none;border-radius:18px;padding:5px 12px;box-shadow:0 2px 10px rgba(180,80,100,.25)}
  .bondwrap svg{width:15px;height:15px;fill:var(--rose);stroke:none;filter:drop-shadow(0 1px 3px rgba(180,80,100,.3))}
  .bondbar{width:54px;height:4px;border-radius:99px;background:rgba(194,86,112,.15);overflow:hidden}
  .bondbar>i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--goldL),var(--rose));transition:width .6s}
  .gameskip{position:absolute;top:60px;right:14px;z-index:8;font-size:13px;letter-spacing:.12em;
    color:var(--rose);background:rgba(255,240,244,.45);backdrop-filter:blur(12px);border:none;border-radius:18px;
    padding:7px 16px;cursor:pointer;box-shadow:0 2px 10px rgba(180,80,100,.25);transition:transform .12s}
  .gameskip:active{transform:scale(.94)}

  /* ===== 选项 ===== */
  #choices{position:absolute;left:0;right:0;top:0;bottom:0;z-index:7;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;padding:0 24px;}
  .opt{width:100%;max-width:380px;text-align:center;font-size:15px;line-height:1.5;color:#f0e0e4;
    padding:14px 18px;border-radius:18px;cursor:pointer;
    background:rgba(20,8,14,.3);backdrop-filter:blur(20px);
    border:none;border-left:2px solid rgba(210,120,140,.5);
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    transition:transform .12s,background .2s;animation:optIn .4s backwards}
  .opt:nth-child(2){animation-delay:.07s}.opt:nth-child(3){animation-delay:.14s}
  .opt:hover{transform:translateY(-2px);background:rgba(20,8,14,.42)}
  .opt .tag{font-size:11px;color:rgba(255,255,255,.5);margin-left:6px}
  @keyframes optIn{from{opacity:0;transform:translateY(16px)}to{opacity:1}}

  /* ===== 对话框 ===== */
  #dialog{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:0;cursor:pointer;}
  .panel{position:relative;max-width:100%;margin:0;border-radius:0;padding:28px 28px 22px;min-height:130px;
    background:linear-gradient(180deg,transparent,rgba(20,8,14,.25) 18%,rgba(20,8,14,.45));
    border:none;border-top:1px solid rgba(210,120,140,.3);box-shadow:none;
    backdrop-filter:blur(12px) saturate(1.05);}
  .speaker{position:relative;top:auto;left:auto;font-family:var(--serif);font-size:14px;font-weight:700;
    letter-spacing:.1em;padding:0 4px 8px;border-radius:0;color:#e8b8c0;
    background:none;border:none;box-shadow:none;display:inline-block}
  .speaker.ant{color:#d4a8b0}
  .speaker.yiyi{color:#e8c880}
  .speaker.hide{display:none}
  .text{font-size:16px;line-height:1.9;color:#f0e0e4;min-height:80px;letter-spacing:.03em;margin-top:6px}
  .text.narration{font-style:italic;color:rgba(255,255,255,.65);text-align:center;font-size:15px;
    display:flex;align-items:center;justify-content:center}
  .indicator{position:absolute;right:20px;bottom:14px;color:rgba(255,255,255,.4);font-size:14px;opacity:0;transition:opacity .2s;animation:bob 1.1s ease-in-out infinite}
  .indicator.show{opacity:1}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

  /* ===== 卡片：章节/完成/结局 ===== */
  .cover{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:40px 32px;gap:15px;animation:fade .5s ease;}
  .cover .deco{font-size:12px;letter-spacing:.3em;color:var(--gold)}
  .cover h1{font-family:var(--serif);font-size:28px;line-height:1.45;color:var(--rose);text-shadow:0 1px 0 #fff}
  .cover p{font-size:14.5px;line-height:1.95;color:var(--ink)}
  .cover .big{font-size:46px}
  .btn{font-size:15px;font-weight:700;letter-spacing:.06em;color:#fff;cursor:pointer;padding:13px 36px;border:none;
    border-radius:28px;background:linear-gradient(135deg,var(--rose),#a8405a);
    box-shadow:0 8px 24px rgba(180,80,100,.35);transition:transform .12s,box-shadow .2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(180,80,100,.42)}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:rgba(255,245,248,.5);backdrop-filter:blur(10px);color:var(--rose);
    border:none;box-shadow:0 4px 14px var(--shadow)}
  .btn.ghost:hover{box-shadow:0 6px 20px rgba(180,80,100,.25)}
  .chapter{position:absolute;inset:0;z-index:11;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;gap:14px;cursor:pointer;animation:fade .5s ease;}
  .chapter .veil2{position:absolute;inset:0;background:rgba(253,240,244,.55);backdrop-filter:blur(8px);}
  .chapter>*{position:relative;z-index:1}
  .chapter .n{font-size:13px;letter-spacing:.34em;color:var(--goldD)}
  .chapter h2{font-family:var(--serif);font-size:25px;line-height:1.5;color:var(--rose);text-shadow:0 1px 0 #fff}
  .chapter small{color:var(--ink2);font-size:12px;margin-top:16px;letter-spacing:.12em}
  .row2{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .etag{font-size:13px;letter-spacing:.2em;color:var(--goldD)}
  .escore{font-size:13px;color:var(--ink2);margin-top:2px}

  /* 结局图鉴 */
  .gallist{display:flex;flex-direction:column;gap:11px;width:100%;max-width:360px;max-height:54vh;overflow-y:auto;padding:2px}
  .galcard{border-radius:18px;padding:13px 16px;text-align:left;border:none;
    background:rgba(255,240,244,.6);backdrop-filter:blur(10px);box-shadow:0 4px 16px var(--shadow)}
  .galcard.lock{opacity:.7;filter:grayscale(.4)}
  .galcard .gbig{font-size:26px}
  .galcard .gtag{font-size:11px;letter-spacing:.2em;color:var(--goldD);margin-top:2px}
  .galcard .gtit{font-family:var(--serif);font-size:17px;color:var(--rose);margin:2px 0 4px}
  .galcard .gdesc{font-size:12px;line-height:1.7;color:var(--ink2)}

  /* ===== 名字录入页 ===== */
  #setup{padding:0 30px}
  .setupbox{position:relative;z-index:3;width:min(360px,90%);
    background:rgba(255,245,248,.7);backdrop-filter:blur(22px) saturate(1.2);
    border:none;border-radius:24px;padding:26px 24px 22px;
    box-shadow:0 14px 44px var(--shadow);display:flex;flex-direction:column;gap:9px;align-items:center}
  .setupbox h2{font-family:var(--serif);font-size:22px;color:var(--rose);margin:2px 0 4px;text-shadow:0 1px 0 #fff}
  .setupbox label{align-self:flex-start;font-size:14px;color:var(--ink);letter-spacing:.04em;margin-top:6px;font-weight:600}
  .setupbox input{width:100%;font-size:16px;color:var(--ink);background:rgba(255,252,253,.5);border:none;
    border-radius:14px;padding:11px 14px;outline:none;font-family:inherit;
    box-shadow:inset 0 2px 6px rgba(180,80,100,.08);
    -webkit-user-select:text;user-select:text}
  .setupbox input::placeholder{color:#c4a0a8;font-size:13px}
  .setupbox input:focus{box-shadow:inset 0 2px 6px rgba(180,80,100,.08),0 0 0 3px rgba(194,86,112,.12)}
  .setupbox .btn{margin-top:16px}
  .setuphint{font-size:11.5px;color:var(--ink2);line-height:1.7;margin-top:8px;text-align:center}

  /* 编辑系统 */
  #editOverlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(90,48,64,.4);backdrop-filter:blur(4px);animation:fade .2s ease}
  #editBox{width:90%;max-width:380px;background:rgba(255,245,248,.8);backdrop-filter:blur(20px);border:none;border-radius:22px;padding:20px;box-shadow:0 8px 32px var(--shadow)}
  #editBox h3{font-family:var(--serif);font-size:16px;color:var(--rose);margin-bottom:10px}
  #editArea{width:100%;min-height:120px;font-size:14px;color:var(--ink);background:rgba(255,252,253,.5);border:none;
    border-radius:12px;padding:12px;outline:none;font-family:inherit;resize:vertical;
    box-shadow:inset 0 2px 6px rgba(180,80,100,.08);
    -webkit-user-select:text;user-select:text;line-height:1.8}
  #editArea:focus{box-shadow:inset 0 2px 6px rgba(180,80,100,.08),0 0 0 3px rgba(194,86,112,.12)}
  .editrow{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}

<body>
<div class="game" id="game">

  <!-- 游戏背景：底层模糊铺满 + 上层完整图居中（两层为兄弟，blur 不污染清晰层） -->
  <div class="gbg hidden" id="gamebg"></div>
  <div class="gbgfront hidden" id="gamebgF"></div>
  <div class="veil game hidden" id="gameveil"></div>

  <!-- 花瓣 -->
  <div id="petals"></div>

  <!-- BGM（循环播放） -->
  <audio id="bgmAudio" loop preload="auto" style="display:none"><source src="bgm.mp3" type="audio/mpeg"></audio>

  <!-- ① 主页 -->
  <div class="screen" id="home">
    <div class="bg"></div>
    <div class="start" onclick="onStart()">
      <div class="startword" id="startword">START</div>
      <div class="starthint">轻 触 开 始</div>
    </div>
    <!-- <div class="homesaves" onclick="openSaves('home')"><span>☰ 存档记录</span></div> -->
    <div id="editToggle" onclick="toggleEdit()">✏️ 编辑模式</div>
    <div id="tokenBtn" onclick="setupGHToken()" style="position:absolute;top:calc(6% + 22px);right:16px;font-size:10px;color:#fff;cursor:pointer;opacity:.7;text-shadow:0 1px 6px rgba(120,40,50,.6);z-index:4;display:none">🔑 同步设置</div>
  </div>

  <!-- ①b 名字录入 -->
  <div class="screen hidden" id="setup">
    <div class="bg soft"></div>
    <div class="veil read"></div>
    <div class="setupbox">
      <div class="orn">开始之前</div>
      <h2>填写你的设定</h2>
      <label>你的名字：</label>
      <input id="inpPlayer" maxlength="12" placeholder="你在故事里的名字" />
      <label>给 Nagi 的昵称：</label>
      <input id="inpNagi" maxlength="12" placeholder="你想怎么称呼他，如：凪、凪宝、士郎" />
      <button class="btn" onclick="confirmSetup()">进入故事 →</button>
      <div class="setuphint">故事里所有称呼都会替换成上面的名字 ♡<br/>留空则用默认「你 / 凪」</div>
    </div>
  </div>

  <!-- ② 开场白 -->
  <div class="screen hidden" id="prologue" onclick="pgNext()">
    <div class="bg soft"></div>
    <div class="veil read"></div>
    <div class="pgtext" id="pgText"></div>
    <div class="skip" onclick="event.stopPropagation();endPrologue()">跳过 ›</div>
  </div>

  <!-- ③ 章节路线图 -->
  <div class="screen hidden" id="map">
    <div class="bg blur"></div>
    <div class="veil light"></div>
    <div class="maphead">
      <div class="maptitle">Nagi's Heart</div>
      <div class="orn">章节目录</div>
    </div>
    <div class="scroller"><div class="trail" id="trail"></div></div>
    <div class="mapfoot" style="gap:10px">
      <button class="btn ghost" style="font-size:13px;padding:9px 20px" onclick="openSaves('map')">☰ 存档记录</button>
      <button class="btn ghost" style="font-size:13px;padding:9px 20px" onclick="showGallery()">✧ 结局图鉴 ✧</button>
    </div>
  </div>

  <!-- ③b 小节目录（二级页） -->
  <div class="screen hidden" id="smap">
    <div class="bg blur" id="smapbg"></div>
    <div class="veil light"></div>
    <div class="backbtn" onclick="showMap()">‹ 章节</div>
    <div class="maphead">
      <div class="smaptitle" id="smapTitle">第一章</div>
      <div class="smapsub" id="smapSub">相识</div>
    </div>
    <div class="scroller"><div class="seclist" id="seclist"></div></div>
  </div>

  <!-- HUD（游戏中） -->
  <div class="hud hidden" id="hud">
    <div class="iconbtn" onclick="exitToSection()" title="返回章节目录">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg></div>
    <div class="iconbtn" onclick="quickSave()" title="存档">
      <svg viewBox="0 0 24 24"><path d="M5 3h11l3 3v15H5zM8 3v6h7V3M8 14h8v7H8z"/></svg></div>
    <div class="chiptitle" id="chapName">序章</div>
    <div class="sp"></div>
    <div class="bondwrap">
      <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-9C.8 8.5 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5.2 3.5 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg>
      <div class="bondbar"><i id="bond"></i></div>
    </div>
  </div>

  <!-- 选项 -->
  <div id="choices" class="hidden"></div>

  <!-- 剧情跳过 -->
  <div class="gameskip hidden" id="gameskip" onclick="skipSection()">跳过本节 ›</div>

  <!-- 对话框 -->
  <div id="dialog" class="hidden" onclick="tap()">
    <div class="panel">
      <div class="speaker" id="speaker">凪诚士郎</div>
      <div class="text" id="text"></div>
      <div class="indicator" id="indicator">▼</div>
      <div id="editbtn" onclick="event.stopPropagation();editCurLine()">✏️</div>
    </div>
  </div>

  <!-- 小节过场 -->
  <div class="chapter hidden" id="chap" onclick="closeChap()">
    <div class="veil2"></div>
    <div class="orn"></div>
    <div class="n" id="chapN"></div>
    <h2 id="chapT"></h2>
    <div class="orn"></div>
    <small>轻触继续 →</small>
  </div>

  <!-- 本节完成 -->
  <div class="cover hidden" id="clear">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" style="position:relative">SECTION CLEAR</div>
    <div style="position:relative"><svg width="46" height="42" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 28C16 28 4 20 4 12a6 6 0 0 1 12 0 6 6 0 0 1 12 0c0 8-12 16-12 16z" fill="var(--rose)"/>
    </svg></div>
    <h1 id="clearName" style="position:relative;font-size:21px"></h1>
    <p id="clearSub" style="position:relative">本幕完成</p>
    <div class="row2" style="position:relative">
      <button class="btn ghost" id="clearBackBtn">本章目录</button>
      <button class="btn" id="clearNextBtn">下一节 →</button>
    </div>
  </div>

  <!-- 结局 -->
  <div class="cover hidden" id="ending">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" id="etag" style="position:relative"></div>
    <div class="big" id="emoji" style="position:relative">💛</div>
    <h1 id="etitle" style="position:relative"></h1>
    <p id="edesc" style="position:relative"></p>
    <div class="escore" id="escore" style="position:relative"></div>
    <button class="btn" id="eggBtn" style="position:relative;display:none;margin-bottom:4px" onclick="playProposal()">✧ 彩蛋 · 他的求婚 ✧</button>
    <div class="row2" style="position:relative">
      <button class="btn ghost" onclick="backToMenu()">章节目录</button>
      <button class="btn" onclick="location.reload()">重新开始</button>
    </div>
  </div>

  <!-- 结局图鉴 -->
  <div class="cover hidden" id="gallery">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" style="position:relative">ENDINGS · 结局图鉴</div>
    <h1 style="position:relative;font-size:23px" id="galcount">已收藏的结局</h1>
    <div class="gallist" id="gallist" style="position:relative"></div>
    <button class="btn ghost" style="position:relative" onclick="closeGallery()">返回目录</button>
  </div>

  <!-- 存档记录（多卡槽） -->
  <div class="cover hidden" id="saves">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" style="position:relative">SAVE DATA · 存档记录</div>
    <h1 style="position:relative;font-size:23px" id="savecount">存档卡槽</h1>
    <div class="gallist" id="savelist" style="position:relative"></div>
    <button class="btn ghost" style="position:relative" onclick="closeSaves()">返回</button>
  </div>

  <!-- 编辑弹窗 -->
  <div class="hidden" id="editOverlay" onclick="if(event.target===this)cancelEdit()">
    <div id="editBox">
      <h3 id="editLabel">编辑文本</h3>
      <textarea id="editArea"></textarea>
      <div class="editrow">
        <button class="btn ghost" onclick="cancelEdit()">取消</button>
        <button class="btn" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <!-- 轻提示 -->
  <div class="toast" id="toast"></div>

</div>

<script src="story.js"></script>
<script>
/* story.js 已加载: ART, STORY, ENDINGS, CHAPTERS, PROLOGUE_LINES, STAGES, stageIndex, SCENE, PARTS, STAGE2PART, NODEBG, PARTMAP, partOf, FN */
function resolveRouter(id){ if(id==="m_igate"){ mDeep=(D<=3 && I>=4); saveState(); return mDeep?"mt4":"m_shallow"; } return "p1"; }
function enterGameLayer(){
  ["map","smap","clear","ending","gallery","home","prologue","setup","chap"].forEach(i=>$(i).classList.add("hidden"));
  $("gamebg").classList.remove("hidden"); $("gamebgF").classList.add("hidden"); $("gameveil").classList.remove("hidden");
  $("hud").classList.remove("hidden"); $("gameskip").classList.add("hidden"); petals(false);
}
function go(id){
  const node=STORY[id];
  if(!node){ console.warn("缺失节点",id); finish(); return; }
  if(node.router){ go(resolveRouter(id)); return; }
  curNode=id; if(SCENE[id]){ curScene=id; secReset(id); } const si=stageIndex(id); if(si>maxStage)maxStage=si; saveState();
  if(SCENE[id]) showSceneTitle(id);   // 节首 → 先弹「节标题卡」
  else playNode(id);                   // 链内续节 → 直接连续播放
}
function showSceneTitle(id){
  enterGameLayer(); $("hud").classList.add("hidden");
  $("gamebg").style.backgroundImage="url('"+(NODEBG[id]||"bg/apartment.jpg")+"')";
  const st=stageIndex(id);
  $("chapN").textContent=(st===0?"序章":st===5?"终章":"第 "+st+" 章")+" · "+STAGES[st];
  $("chapT").textContent=sub(SCENE[id]);
  if(editMode && SCENE[id]){
    $("chapT").style.cursor="pointer";
    $("chapT").onclick=(e)=>{ e.stopPropagation();
      openEdit("SC."+id, SCENE[id], "编辑节标题", (v)=>{ SCENE[id]=v; $("chapT").textContent=sub(v); });
    };
  } else { $("chapT").style.cursor=""; $("chapT").onclick=null; }
  pendingNode=id;
  $("dialog").classList.add("hidden"); $("choices").classList.add("hidden");
  $("chap").classList.remove("hidden");
}
function playNode(id){
  enterGameLayer(); $("gameskip").classList.remove("hidden"); markSeen(id); playingNode=id;
  const node=STORY[id]; const st=stageIndex(id);
  $("gamebg").style.backgroundImage="url('"+(NODEBG[id]||"bg/apartment.jpg")+"')";
  $("chapName").textContent=(st===0?"序章":st===5?"终章":"第"+st+"章")+" "+STAGES[st]; setBond();
  $("dialog").classList.remove("hidden");
  queue=(node.auto||[]).map(x=>({who:x.who,t:x.t})); qi=0;
  queueKeys=(node.auto||[]).map((_,i)=>"S."+id+".a."+i);
  after={type:"choices", choices:node.choices};
  showLine();
}
function advanceTo(next){
  if(!next){ finish(); return; }
  if(STORY[next] && stageIndex(next) > stageIndex(curNode)) showActClear(stageIndex(curNode), next);
  else go(next);
}
function showActClear(actIdx,next){
  $("dialog").classList.add("hidden"); $("choices").classList.add("hidden"); $("hud").classList.add("hidden");
  $("clearName").textContent=(actIdx===0?"序章":actIdx===5?"终章":"第 "+actIdx+" 章")+" · "+STAGES[actIdx];
  $("clearSub").textContent="本幕完成";
  $("clearBackBtn").textContent="回主页看进度";
  $("clearBackBtn").onclick=()=>{ $("clear").classList.add("hidden"); showMap(); };
  const b=$("clearNextBtn"); b.style.display="inline-block"; b.textContent="进入下一幕 →";
  b.onclick=()=>{ $("clear").classList.add("hidden"); go(next); };
  $("clear").classList.remove("hidden");
}
function startNew(){ clearState(); go("p1"); }
function continueGame(){ if(curNode) go(curNode); else startNew(); }
function newGameConfirm(){ if(localStorage.getItem("nagi_state") && !confirm("重新开始会清空当前进度，确定？")) return; startNew(); }

/* ① 主页 → 开场白 → 名字录入 → 章节目录 */
function onStart(){
  clearInterval(startTimer); $("home").classList.add("hidden");
  // 启动BGM（浏览器要求用户交互后才能播放）
  var bgm=$("bgmAudio"); if(bgm) bgm.play().catch(function(){});
  playPrologue();
}
function showSetup(){
  $("inpPlayer").value = localStorage.getItem("nagi_pname")||"";
  $("inpNagi").value   = localStorage.getItem("nagi_nname")||"";
  $("setup").classList.remove("hidden");
}
function confirmSetup(){
  const p=$("inpPlayer").value.trim(), n=$("inpNagi").value.trim();
  PLAYER = p || "你";  NAGI = n || "凪";
  localStorage.setItem("nagi_pname",PLAYER); localStorage.setItem("nagi_nname",NAGI);
  NAMES.ant=PLAYER; NAMES.nagi=NAGI;
  $("setup").classList.add("hidden"); showMap();
}

/* ② 开场白逐句 */
let pgi=0, pgTimer=null, pgTyper=null, pgTyping=false;
function playPrologue(){ $("prologue").classList.remove("hidden"); petals(true); pgi=0; showPg(); }
function showPg(){
  const el=$("pgText");
  if(pgi>=PROLOGUE_LINES.length){ endPrologue(); return; }
  el.textContent=sub(PROLOGUE_LINES[pgi]);
  el.classList.add("show");
  if(editMode){
    el.style.cursor="pointer";
    el.ondblclick=(e)=>{ e.stopPropagation(); clearTimeout(pgTimer);
      openEdit("PG."+pgi, PROLOGUE_LINES[pgi], "编辑开场白", (v)=>{ PROLOGUE_LINES[pgi]=v; el.textContent=sub(v); });
    };
  } else { el.style.cursor=""; el.ondblclick=null; }
  clearTimeout(pgTimer);
  pgTimer=setTimeout(()=>{ pgi++; showPg(); }, 3000);
}
function pgNext(){ clearTimeout(pgTimer); pgi++; showPg(); }
function endPrologue(){ clearTimeout(pgTimer); clearInterval(pgTyper); $("prologue").classList.add("hidden");
  if(localStorage.getItem("nagi_pname")){ showMap(); } else { showSetup(); } }

/* ③ 章节路线图（一级页）*/
function showMap(){
  ["dialog","choices","chap","ending","clear","hud","gameskip","smap","gallery","gamebgF"].forEach(i=>$(i).classList.add("hidden"));
  $("gamebg").classList.add("hidden"); $("gameveil").classList.add("hidden");
  petals(true);
  renderMenu();
  $("map").classList.remove("hidden");
  return;
}
function renderMenu(){
  const hasSave=!!localStorage.getItem("nagi_state");
  const curPart = hasSave ? STAGE2PART[maxStage] : -1;
  const t=$("trail"); t.style.height="auto";
  let h='<div style="width:300px;margin:18px auto 14px;display:flex;flex-direction:column;gap:7px">';
  PARTS.forEach((p,pi)=>{
    const reached = hasSave && maxStage>=p.stages[0];
    const isCur = pi===curPart, open = menuOpen===pi && reached;
    h+='<div onclick="toggleMenuPart('+pi+')" style="cursor:pointer;display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:12px;'
      +(reached?'background:rgba(201,160,99,.20);border:1px solid var(--gold);'
               :'background:rgba(160,140,120,.10);border:1px solid rgba(120,90,70,.12);')
      +(isCur?'box-shadow:0 0 0 2px rgba(156,58,72,.35);':'')+'">'
      +'<span style="font-family:var(--serif);font-size:14px;width:16px;text-align:center;color:'+(reached?'var(--rose)':'#c4b3a4')+'">'+(reached?(isCur?'▶':'✓'):(pi+1))+'</span>'
      +'<span style="flex:1;font-size:13.5px;color:'+(reached?'var(--ink)':'#b6a496')+'">'+(pi===0?"序章":pi===PARTS.length-1?"终章":"第"+pi+"章")+' · '+p.t+'</span>'
      +'<span style="font-size:11px;color:'+(reached?'var(--gold)':'#c4b3a4')+'">'+(reached?(open?'▲':'▼'):'🔒')+'</span></div>';
    if(open){
      let locked=0;
      h+='<div style="display:flex;flex-direction:column;gap:5px;padding:1px 6px 6px 20px">';
      CHAPTERS[pi].sections.forEach(s=>{
        const id=s.start;
        if(seen.has(id)) h+='<div onclick="jumpTo(\''+id+'\')" style="cursor:pointer;font-size:12.5px;color:var(--ink2);padding:6px 11px;border-radius:9px;background:rgba(255,250,246,.72);border:1px solid var(--line)">▷ '+esc(sub(s.title))+'</div>';
        else locked++;
      });
      if(locked) h+='<div style="font-size:11.5px;color:#c4b3a4;padding:4px 11px">🔒 还有 '+locked+' 幕待解锁（换条线/换种选择重玩）</div>';
      h+='</div>';
    }
  });
  h+='</div><div style="display:flex;flex-direction:column;gap:11px;align-items:center">';
  if(hasSave) h+='<button class="btn" onclick="continueGame()">继续上次 →</button>';
  h+='<button class="btn'+(hasSave?' ghost':'')+'" onclick="newGameConfirm()">'+(hasSave?'重新开始':'开始游戏 →')+'</button></div>';
  t.innerHTML=h;
}
function toggleMenuPart(i){ menuOpen=(menuOpen===i?-1:i); renderMenu(); }
function jumpTo(id){ menuOpen=-1; go(id); }
function _oldShowMap_unused(){
  ["dialog","choices","chap","ending","clear","hud","gameskip","smap","gallery","gamebgF"].forEach(i=>$(i).classList.add("hidden"));
  $("gamebg").classList.add("hidden"); $("gameveil").classList.add("hidden");
  currentCI=null; currentSI=null; petals(true); renderMap();
  $("map").classList.remove("hidden");
}
function renderMap(){
  const trail=$("trail"); trail.innerHTML="";
  const W=340, top=64, step=112, xL=92, xR=248;
  const N=CHAPTERS.length, H=top*2+(N-1)*step;
  trail.style.height=H+"px";
  const pts=CHAPTERS.map((c,i)=>({x:i%2===0?xL:xR, y:top+i*step}));
  let d="M "+pts[0].x+" "+pts[0].y;
  for(let i=1;i<N;i++){ const a=pts[i-1],b=pts[i];
    d+=" C "+a.x+" "+(a.y+step*0.5)+" "+b.x+" "+(b.y-step*0.5)+" "+b.x+" "+b.y; }
  const svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="rgba(210,120,140,.45)" stroke-width="3" stroke-dasharray="2 9" stroke-linecap="round"/>
  </svg>`;
  trail.insertAdjacentHTML("beforeend",svg);
  CHAPTERS.forEach((c,i)=>{
    const locked=i>unlocked, done=chapterDone(i), cur=i===unlocked && unlocked<N;
    const p=pts[i];
    const node=document.createElement("div");
    node.className="node"+(locked?" locked":"")+(done?" done":"")+(cur?" current":"");
    node.style.left=p.x+"px"; node.style.top=p.y+"px";
    node.innerHTML=(locked?"🔒":(i===0?"♡":i===N-1?"★":i))+(done?'<span class="badge">✓</span>':"");
    if(!locked) node.onclick=()=>openChapterMap(i);
    trail.appendChild(node);
    const lab=document.createElement("div");
    lab.className="nlabel"; lab.style.left=p.x+"px"; lab.style.top=(p.y+34)+"px";
    lab.innerHTML="<b>"+c.n+"</b>"+sub(c.title);
    trail.appendChild(lab);
  });
}
function resetProgress(){
  if(!confirm("确定清空所有章节进度？")) return;
  unlocked=0; route=null; bond=0; und=0; coldFlag=false; doneSet=new Set();
  finalFlag=null;
  ["nagi_unlocked","nagi_route","nagi_done","nagi_bond","nagi_und","nagi_cold","nagi_flag"].forEach(k=>localStorage.removeItem(k));
  renderMap();
}

/* ③b 小节目录（二级页）*/
function openChapterMap(ci){
  ["map","clear","ending","chap","home","prologue","dialog","choices","hud","gameskip","gallery","gamebgF"].forEach(i=>$(i).classList.add("hidden"));
  $("gamebg").classList.add("hidden"); $("gameveil").classList.add("hidden");
  currentCI=ci; currentSI=null; petals(true);
  if(!route) route="dream";
  $("smapbg").style.backgroundImage="url('"+(CHAPTERS[ci].bg||"bg/apartment.jpg")+"')";
  renderSectionMap(ci);
  $("smap").classList.remove("hidden");
}
function renderSectionMap(ci){
  const ch=CHAPTERS[ci];
  $("smapTitle").textContent=sub(ch.n+" · "+ch.title);
  if(editMode){
    $("smapTitle").style.cursor="pointer";
    $("smapTitle").onclick=(e)=>{ e.stopPropagation();
      openEdit("C."+ci+".t",ch.title,"编辑章标题",(v)=>{ch.title=v;$("smapTitle").textContent=sub(ch.n+" · "+v);});
    };
  } else { $("smapTitle").style.cursor=""; $("smapTitle").onclick=null; }
  $("smapSub").textContent=chapterDone(ci)?"本章已通关 ✓":(ch.sections.length+" 幕");
  const box=$("seclist"); box.innerHTML="";
  ch.sections.forEach((s,si)=>{
    const done=doneSet.has(ci+"-"+si);
    const card=document.createElement("div");
    card.className="seccard"+(done?" done":"");
    card.style.animationDelay=(si*0.05)+"s";
    card.innerHTML='<div class="sidx">'+(si+1)+'</div>'
      +'<div class="sbody"><div class="sn">'+s.n+'</div><div class="st">'+esc(sub(secTitle(s)))+'</div></div>'
      +'<div class="sck">'+(done?'✓':'›')+'</div>';
    if(editMode){
      const eb=document.createElement("span"); eb.className="secedit"; eb.textContent="✏️";
      eb.onclick=(e)=>{ e.stopPropagation();
        openEdit("C."+ci+".s."+si+".t", s.title, "编辑幕标题", (v)=>{ s.title=v; card.querySelector(".st").textContent=sub(v); });
      }; card.appendChild(eb);
    }
    card.onclick=()=>playSection(ci,si);
    box.appendChild(card);
  });
}

/* 进入某一节（游戏层）*/
function playSection(ci,si){
  ["smap","map","clear","ending","gallery"].forEach(i=>$(i).classList.add("hidden"));
  $("gamebg").classList.remove("hidden"); $("gameveil").classList.remove("hidden");
  $("hud").classList.remove("hidden"); $("gameskip").classList.remove("hidden"); petals(false);
  currentCI=ci; currentSI=si; setBond();
  if(!route) route="dream";
  const ch=CHAPTERS[ci], s=ch.sections[si];
  const bgImg = s.bg || ch.bg || "bg/apartment.jpg";
  $("gamebg").style.backgroundImage="url('"+bgImg+"')";
  $("chapName").textContent=ch.n;
  $("chapN").textContent=ch.n+" · "+s.n;
  $("chapT").textContent=sub(secTitle(s));
  pendingNode=(s.routed && route==="stay" && s.startStay)? s.startStay : s.start;
  $("dialog").classList.add("hidden"); $("choices").classList.add("hidden");
  $("chap").classList.remove("hidden");
}
function closeChap(){ $("chap").classList.add("hidden"); playNode(pendingNode); }

/* 本节完成 */
function sectionDone(){
  const ci=currentCI, si=currentSI;
  doneSet.add(ci+"-"+si); saveDone();
  if(route) localStorage.setItem("nagi_route",route);
  if(chapterDone(ci) && ci+1>unlocked){ unlocked=ci+1; saveUnlocked(); }
  const ch=CHAPTERS[ci], s=ch.sections[si];
  $("dialog").classList.add("hidden"); $("choices").classList.add("hidden"); $("gameskip").classList.add("hidden");
  $("clearName").textContent=sub(ch.n+" · "+secTitle(s));
  $("clearSub").textContent=chapterDone(ci)?("「"+ch.title+"」已通关 · 🎉"):"本幕完成";
  $("clearBackBtn").onclick=()=>{ $("clear").classList.add("hidden"); openChapterMap(ci); };
  const btn=$("clearNextBtn");
  if(si+1<ch.sections.length){
    btn.style.display="inline-block"; btn.textContent="下一幕 →";
    btn.onclick=()=>{ $("clear").classList.add("hidden"); playSection(ci,si+1); };
  } else if(ci+1<CHAPTERS.length && chapterDone(ci)){
    btn.style.display="inline-block"; btn.textContent="下一章 →";
    btn.onclick=()=>{ $("clear").classList.add("hidden"); openChapterMap(ci+1); };
  } else {
    btn.style.display="none";
  }
  $("clear").classList.remove("hidden");
}
function backToMenu(){ showMap(); }
function exitToSection(){ showMap(); }

/* 对话推进 */
function typeLine(text){
  text=sub(text);
  typing=true; curText=text; let i=0; const box=$("text"); box.textContent="";
  $("indicator").classList.remove("show"); clearInterval(typer);
  typer=setInterval(()=>{ box.textContent=text.slice(0,++i);
    if(i>=text.length){ clearInterval(typer); typing=false; $("indicator").classList.add("show"); } },26);
}
function applyWho(who){
  const sp=$("speaker");
  if(who==="sys"){ sp.classList.add("hide"); $("text").classList.add("narration"); }
  else{ sp.classList.remove("hide"); $("text").classList.remove("narration");
    sp.textContent=NAMES[who]; sp.className="speaker"+(who==="ant"?" ant":who==="yiyi"?" yiyi":""); }
}
function showLine(){ const ln=queue[qi]; applyWho(ln.who); typeLine(ln.t); secRead++; setBond();
  $("editbtn").style.display=(editMode&&queueKeys[qi])?"flex":"none"; }
function tap(){
  if(choicesOpen) return;
  if(typing){ clearInterval(typer); $("text").textContent=curText; typing=false; $("indicator").classList.add("show"); return; }
  qi++; if(qi<queue.length){ showLine(); } else { onQueueEnd(); }
}
function onQueueEnd(){
  if(after&&after.type==="choices"){ renderChoices(after.choices); }
  else if(after&&after.type==="go"){ advanceTo(after.next); }
  else if(after&&after.type==="endbad"){ finish("bad"); }
  else if(after&&after.type==="egg"){ eggFinish(); }
  else if(after&&after.type==="end"){ finish(); }
}
function renderChoices(list){
  choicesOpen=true; $("indicator").classList.remove("show");
  $("editbtn").style.display="none";
  $("dialog").classList.add("hidden");           // 选项出现时隐藏对话框，杜绝重叠
  const box=$("choices"); box.innerHTML=""; box.classList.remove("hidden");
  list.forEach((c,ci)=>{ c._ci=ci; const b=document.createElement("div"); b.className="opt";
    b.innerHTML=esc(sub(c.label));
    if(editMode){
      const eb=document.createElement("span"); eb.className="optedit"; eb.textContent="✏️";
      eb.onclick=(e)=>{ e.stopPropagation();
        openEdit("S."+playingNode+".c."+ci+".l", c.label, "编辑选项", (v)=>{ c.label=v; b.firstChild.textContent=sub(v); });
      }; b.appendChild(eb);
    }
    b.onclick=(e)=>{ e.stopPropagation(); choose(c); }; box.appendChild(b); });
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function choose(c){
  choicesOpen=false; $("choices").classList.add("hidden");
  $("dialog").classList.remove("hidden");
  I += (c.i||0) + (c.u||0);          // 懂他：理解值 + 显式 i
  D += (c.d||0);                      // 心墙：显式陷阱 d
  if(c.set){ if(c.set.line) mj=c.set.line; if(c.set.path) path=c.set.path; if(c.set.kc3) kc3=c.set.kc3; if(c.set.nel) nel=c.set.nel; if(c.set.nagiResonate) nagiResonate=c.set.nagiResonate; if(c.set.antCompress) antCompress=c.set.antCompress; }
  if(c.route){ route=c.route; path=c.route; localStorage.setItem("nagi_route",route); }
  if(c.flag) finalFlag=c.flag;
  saveState(); setBond();
  const ci=c._ci; const q=c.ant?[{who:"ant",t:c.ant}]:[];
  queueKeys=["S."+playingNode+".c."+ci+".a"];
  let ni=0;
  (c.nagi||[]).forEach((ln,j)=>{ if(ln){ q.push({who:"nagi",t:ln}); queueKeys.push("S."+playingNode+".c."+ci+".n."+j); } });
  queue=q; qi=0;
  const nxt = c.next || getFN(curNode);
  after = c.egg ? {type:"egg"} : c.endBad ? {type:"endbad"} : c.end ? {type:"end"} : (nxt ? {type:"go",next:nxt} : {type:"end"});
  showLine();
}
function play(id){
  const sc=STORY[id]; if(!sc){ console.warn("缺失节点",id); sectionDone(); return; }
  playingNode=id;
  $("dialog").classList.remove("hidden");
  queue=(sc.auto||[]).map(x=>({who:x.who,t:x.t})); qi=0;
  queueKeys=(sc.auto||[]).map((_,i)=>"S."+id+".a."+i);
  after={type:"choices", choices:sc.choices};
  showLine();
}

function skipSection(){
  if(!confirm("确定跳过本节吗？")) return;
  clearInterval(typer); typing=false; choicesOpen=false; clearTimeout(pgTimer);
  if((currentCI==null || currentSI==null) && curNode){
    for(let ci=0;ci<CHAPTERS.length;ci++){
      const secs=CHAPTERS[ci].sections;
      for(let si=0;si<secs.length;si++){
        let id=secs[si].start, vis=new Set();
        while(id && !vis.has(id)){ vis.add(id); if(id===curNode){currentCI=ci;currentSI=si;break;} id=getFN(id); if(id&&SEC_STARTS.has(id))break; }
        if(currentCI!=null) break;
      }
      if(currentCI!=null) break;
    }
  }
  if(currentCI==null){ showMap(); return; }
  const ch=CHAPTERS[currentCI];
  if(currentCI===CHAPTERS.length-1 && currentSI===ch.sections.length-1){ finish(); }
  else { sectionDone(); }
}

function finish(forceTier){
  let tier=forceTier;
  if(!tier){
    if(path==="cling" || D>=6) tier="bad";
    else if(nagiResonate && !antCompress && D<=3 && path==="dream" && finalFlag==="support") tier="true";
    else if(!antCompress && path==="dream") tier="good";
    else tier="normal";
  }
  const e=ENDINGS[tier]; unlockEnding(tier);
  localStorage.removeItem("nagi_state");
  $("chapName").textContent=sub(e.status);
  setTimeout(()=>{
    $("dialog").classList.add("hidden"); $("hud").classList.add("hidden"); $("gameskip").classList.add("hidden");
    $("etag").textContent=e.tag; $("emoji").textContent=e.emoji;
    $("etitle").textContent=sub(e.title); $("edesc").innerHTML=sub(e.desc);
    const ln=(mj==="J"?"较劲线":mj==="M"?"默契线":"——")+(path?(" · "+({dream:"梦想线",stay:"相守线",cling:"执念"}[path]||"")):"");
    $("escore").innerHTML="♡ "+ln+"<br>"+sub(e.sub);
    if(editMode){
      $("etitle").style.cursor="pointer";
      $("etitle").onclick=()=>openEdit("E."+tier+".title",e.title,"编辑结局标题",(v)=>{e.title=v;$("etitle").textContent=sub(v);});
      $("edesc").style.cursor="pointer";
      $("edesc").onclick=()=>openEdit("E."+tier+".desc",e.desc,"编辑结局描述",(v)=>{e.desc=v;$("edesc").innerHTML=sub(v);});
    }
    $("eggBtn").style.display = (tier==="true") ? "inline-block" : "none";
    $("ending").classList.remove("hidden");
  },700);
}
/* ★ TRUE END 彩蛋：他的求婚 */
function playProposal(){
  enterGameLayer();
  $("gamebg").style.backgroundImage="url('bg/propose.jpg')";
  $("chapName").textContent="彩蛋 · 他的求婚";
  $("dialog").classList.remove("hidden"); playingNode="c8c";
  const sc=STORY["c8c"];
  queue=sc.auto.map(x=>({who:x.who,t:x.t})); qi=0;
  queueKeys=sc.auto.map((_,i)=>"S.c8c.a."+i);
  after={type:"choices", choices:sc.choices};
  showLine();
}
function eggFinish(){
  unlockEnding("true");
  $("dialog").classList.add("hidden"); $("hud").classList.add("hidden"); $("gameskip").classList.add("hidden");
  $("etag").textContent="TRUE END · 彩蛋"; $("emoji").textContent="💍";
  $("etitle").textContent="他的求婚"; $("eggBtn").style.display="none";
  $("edesc").innerHTML=sub("那句话，他到底也没能完整地说出口。<br/>可夕阳慢慢爬过落地窗，<br/>给两个人镀上一圈暖金的边——<br/>有些答案，本就不必说破。");
  $("escore").innerHTML="💍 后来的事，都藏在那年的夕阳里";
  $("ending").classList.remove("hidden");
}

/* ====== 多存档卡槽（日乙本地存档）====== */
function loadSaves(){ try{ return JSON.parse(localStorage.getItem("nagi_saves")||"[]"); }catch(e){ return []; } }
function writeSaves(a){ localStorage.setItem("nagi_saves",JSON.stringify(a)); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),1700); }
function quickSave(){
  if(!curNode){ toast("还没有进入剧情"); return; }
  const sceneId = curScene || (SCENE[curNode]?curNode:null);
  const nm = sceneId ? sub(SCENE[sceneId]) : ("第"+(stageIndex(curNode)+1)+"幕 · "+STAGES[stageIndex(curNode)]);
  const a=loadSaves();
  a.unshift({ id:Date.now(), node:curNode, scene:sceneId, name:nm,
    part:(PARTMAP[curNode]||partOf(curNode)),
    act:"第"+(stageIndex(curNode)+1)+"幕 · "+STAGES[stageIndex(curNode)],
    ts:Date.now(),
    st:{I,D,mj,path,kc3,nel,mDeep,finalFlag,maxStage,curScene,route,coldFlag,bond,und},
    pname:PLAYER, nname:NAGI });
  if(a.length>30) a.length=30;
  writeSaves(a); toast("已存档 ♡ "+nm);
}
let savesFrom="map";
function openSaves(from){
  savesFrom=from||"map";
  ["home","map","smap","gallery","ending","clear","chap","dialog","choices","hud","gameskip"].forEach(i=>$(i).classList.add("hidden"));
  petals(true); renderSaves(); $("saves").classList.remove("hidden");
}
function closeSaves(){
  $("saves").classList.add("hidden");
  if(savesFrom==="home"){ petals(true); $("home").classList.remove("hidden"); startTypewriter(); }
  else showMap();
}
function fmtTime(ts){ const d=new Date(ts), p=n=>(n<10?"0":"")+n;
  return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes()); }
function renderSaves(){
  const a=loadSaves();
  $("savecount").textContent = a.length ? ("存档卡槽 · "+a.length+" 条") : "存档卡槽";
  const box=$("savelist"); box.innerHTML="";
  if(!a.length){ box.innerHTML='<div class="saveempty">还没有任何存档。<br/>进入剧情后，点顶部 💾 图标即可随时存档。</div>'; return; }
  a.forEach(s=>{
    const card=document.createElement("div"); card.className="savecard";
    const line=(s.st&&s.st.path)?({dream:"梦想线",stay:"相守线",cling:"执念"}[s.st.path]||""):"";
    card.innerHTML='<div class="svtag">'+esc(s.part||"")+(line?(' · '+line):'')+'</div>'
      +'<div class="svtit">'+esc(s.name||"存档")+'</div>'
      +'<div class="svmeta">'+esc(s.act||"")+'<br/>'
      +esc(s.pname||"你")+' ♡ '+esc(s.nname||"凪")+' · '+fmtTime(s.ts)+'</div>'
      +'<div class="savedel" title="删除">×</div>';
    card.onclick=()=>loadSlot(s.id);
    card.querySelector(".savedel").onclick=(e)=>{ e.stopPropagation(); deleteSlot(s.id); };
    box.appendChild(card);
  });
}
function deleteSlot(id){
  if(!confirm("删除这条存档？")) return;
  writeSaves(loadSaves().filter(s=>s.id!==id)); renderSaves();
}
function loadSlot(id){
  const s=loadSaves().find(x=>x.id===id); if(!s){ toast("存档已失效"); return; }
  const st=s.st||{};
  I=st.I||0; D=st.D||0; mj=st.mj||null; path=st.path||null; kc3=st.kc3||null; nel=st.nel||null;
  mDeep=!!st.mDeep; finalFlag=st.finalFlag||null; maxStage=st.maxStage||0; curScene=st.curScene||s.scene||null;
  route=st.route||route; coldFlag=!!st.coldFlag; bond=st.bond||0; und=st.und||0;
  if(s.pname){ PLAYER=s.pname; localStorage.setItem("nagi_pname",PLAYER); NAMES.ant=PLAYER; }
  if(s.nname){ NAGI=s.nname; localStorage.setItem("nagi_nname",NAGI); NAMES.nagi=NAGI; }
  if(route) localStorage.setItem("nagi_route",route);
  localStorage.setItem("nagi_cold",coldFlag?"1":"0"); saveScore();
  curNode=s.node; saveState();
  $("saves").classList.add("hidden");
  toast("读取存档 ♡ "+(s.name||""));
  go(s.node);
}

/* ====== 结局图鉴 ====== */
const ENDING_ORDER=["true","good","normal","bad"];
function unlockEnding(tier){
  let a=JSON.parse(localStorage.getItem("nagi_endings")||"[]");
  if(!a.includes(tier)){ a.push(tier); localStorage.setItem("nagi_endings",JSON.stringify(a)); }
}
function showGallery(){ $("map").classList.add("hidden"); petals(true); renderGallery(); $("gallery").classList.remove("hidden"); }
function closeGallery(){ $("gallery").classList.add("hidden"); showMap(); }
function renderGallery(){
  const got=JSON.parse(localStorage.getItem("nagi_endings")||"[]");
  $("galcount").textContent="已收藏的结局 "+ENDING_ORDER.filter(k=>got.includes(k)).length+" / "+ENDING_ORDER.length;
  const box=$("gallist"); box.innerHTML="";
  ENDING_ORDER.forEach(k=>{
    const e=ENDINGS[k], has=got.includes(k);
    const c=document.createElement("div"); c.className="galcard"+(has?"":" lock");
    let html = has
      ? '<span class="gbig">'+e.emoji+'</span><div class="gtag">'+e.tag+'</div><div class="gtit">'+e.title+'</div><div class="gdesc">'+e.desc+'</div>'
      : '<span class="gbig">🔒</span><div class="gtag">??? END</div><div class="gtit">尚未解锁</div><div class="gdesc">达成对应结局后，将在此收藏。</div>';
    if(has && k==="true") html+='<span class="galegg" onclick="event.stopPropagation();closeGallery();playProposal()">✧ 彩蛋 · 他的求婚 ✧</span>';
    c.innerHTML=html;
    box.appendChild(c);
  });
}

document.addEventListener("keydown",e=>{ if(e.code==="Space"||e.code==="Enter"){ e.preventDefault();
  if(!$("prologue").classList.contains("hidden")) pgNext(); else tap(); }});
</script>
