<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Blue Lock: Nagi's Heart · 梦向乙游</title>
<style>
  :root{
    --cream:#faf1e8; --peach:#f3d6c8; --peachD:#e7b3a1;
    --gold:#c9a063; --goldD:#a8824a; --goldL:#e3c79a;
    --rose:#9c3a48; --roseL:#c96b78;
    --ink:#5a4038; --ink2:#937568; --white:#fffaf6;
    --line:rgba(201,160,99,.45);
    --serif:"Baskerville","Songti SC","Times New Roman",Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none}
  html,body{height:100%}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    background:#e7c3b4;color:var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .game{position:relative;width:100%;max-width:460px;height:100dvh;max-height:940px;
    overflow:hidden;background:var(--cream);box-shadow:0 0 80px rgba(120,70,60,.4);}

  /* 背景图层 */
  .bg{position:absolute;inset:0;background:url("home.jpg") center top/cover no-repeat;}
  /* 游戏内背景：直接裁剪铺满（清晰、占屏，顶部对齐保面部） */
  .gbg{position:absolute;inset:0;background-position:center top;background-size:cover;background-repeat:no-repeat;}
  .gbgfront{display:none;}
  .bg.blur{filter:blur(11px) brightness(1.04) saturate(1.05);transform:scale(1.12);}
  .bg.soft{filter:blur(3px) brightness(1.02);transform:scale(1.06);}
  .veil{position:absolute;inset:0;}
  .veil.light{background:linear-gradient(180deg,rgba(250,241,232,.35),rgba(243,210,196,.55));}
  .veil.read{background:linear-gradient(180deg,rgba(250,241,232,.5),rgba(231,179,161,.6));}
  .veil.game{background:linear-gradient(180deg,transparent 36%,rgba(250,241,232,.16) 64%,rgba(243,210,196,.42));}

  /* 花瓣 */
  #petals{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden}
  .petal{position:absolute;top:-24px;width:14px;height:14px;border-radius:60% 0 60% 0;
    background:radial-gradient(circle at 30% 30%,#ffd9d2,#f0a8a0);opacity:.75;
    animation:fall linear infinite;}
  @keyframes fall{0%{transform:translateY(0) rotate(0);opacity:0}
    10%{opacity:.8}100%{transform:translateY(106vh) rotate(360deg);opacity:.2}}

  /* 通用全屏页 */
  .screen{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;animation:fade .5s ease;}
  .hidden{display:none!important}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* 金棕装饰分隔 */
  .orn{display:flex;align-items:center;gap:10px;color:var(--gold);font-size:13px;letter-spacing:.2em}
  .orn::before,.orn::after{content:"";width:40px;height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent)}

  /* ===== 主页 ===== */
  #home .start{position:absolute;bottom:13%;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer}
  #home .startword{font-family:var(--serif);font-size:34px;letter-spacing:.2em;font-weight:600;
    color:#fff;min-height:46px;display:flex;align-items:center;justify-content:center;
    text-shadow:0 2px 10px rgba(156,58,72,.5),0 0 22px rgba(255,255,255,.55);}
  #home .startword .cur{color:var(--goldL);font-weight:400;margin-left:1px;animation:curblink .7s step-end infinite}
  @keyframes curblink{50%{opacity:0}}
  #home .starthint{font-size:12px;letter-spacing:.3em;color:#fff;text-shadow:0 1px 6px rgba(120,40,50,.6);
    opacity:.85;animation:hintb 1.8s ease-in-out infinite}
  @keyframes hintb{0%,100%{opacity:.4}50%{opacity:.9}}
  /* 存档记录入口（首页）*/
  #home .homesaves{position:absolute;bottom:6%;left:0;right:0;text-align:center;z-index:4;
    font-size:12px;letter-spacing:.22em;color:#fff;cursor:pointer;opacity:.9;
    text-shadow:0 1px 6px rgba(120,40,50,.6)}
  #home .homesaves span{border-bottom:1px solid rgba(255,255,255,.5);padding-bottom:2px}
  /* 存档卡片 */
  .savecard{position:relative;border-radius:16px;padding:13px 44px 13px 16px;text-align:left;
    border:1.5px solid var(--gold);background:rgba(255,250,246,.92);cursor:pointer;
    transition:transform .12s,box-shadow .12s}
  .savecard:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(120,40,50,.22)}
  .savecard .svtag{font-size:11px;letter-spacing:.18em;color:var(--goldD)}
  .savecard .svtit{font-family:var(--serif);font-size:16px;color:var(--rose);margin:3px 0 4px}
  .savecard .svmeta{font-size:11.5px;line-height:1.6;color:var(--ink2)}
  .savecard .savedel{position:absolute;top:50%;right:12px;transform:translateY(-50%);
    width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:15px;color:var(--rose);background:rgba(156,58,72,.10);border:1px solid rgba(156,58,72,.25)}
  .saveempty{font-size:13px;color:var(--ink2);line-height:2;opacity:.85;margin-top:30px}
  /* 轻提示 */
  .toast{position:absolute;left:50%;top:18%;transform:translateX(-50%);z-index:30;
    background:rgba(60,30,35,.88);color:#fff;font-size:13px;letter-spacing:.05em;
    padding:9px 20px;border-radius:20px;box-shadow:0 8px 22px rgba(0,0,0,.3);
    opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}

  /* ===== 开场白 ===== */
  #prologue{cursor:pointer;padding:40px 34px}
  .pgtext{position:relative;z-index:3;
    font-family:var(--serif);font-size:21px;line-height:2.1;color:#8f2f3d;font-weight:600;
    width:min(330px,80%);min-height:112px;text-align:left;letter-spacing:.04em;
    opacity:0;transition:opacity 1s ease;
    text-shadow:0 0 5px rgba(255,255,255,.95),0 1px 2px rgba(255,255,255,.9),0 0 16px rgba(255,244,240,.8);}
  .pgtext.show{opacity:1}
  .pgtext .cur{color:var(--goldL);font-weight:400;margin-left:2px;animation:curblink .7s step-end infinite}
  #prologue .skip{position:absolute;bottom:26px;right:24px;font-size:12px;letter-spacing:.2em;
    color:#fff;border:1px solid rgba(255,255,255,.6);border-radius:20px;padding:7px 16px;
    background:rgba(156,58,72,.25);backdrop-filter:blur(3px);text-shadow:0 1px 4px rgba(0,0,0,.3)}

  /* ===== 章节路线图 ===== */
  #map{justify-content:flex-start;}
  #map .maphead{position:absolute;top:0;left:0;right:0;z-index:3;padding:18px 0 14px;height:72px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    background:linear-gradient(180deg,var(--cream) 58%,rgba(250,241,232,.92) 84%,transparent)}
  #map .maptitle{font-family:var(--serif);font-size:23px;color:var(--rose);letter-spacing:.08em;
    text-shadow:0 1px 0 #fff}
  .scroller{position:absolute;top:72px;bottom:62px;left:0;right:0;overflow-y:auto;z-index:2;padding:14px 0 18px;
    scrollbar-width:none;-ms-overflow-style:none}
  .game *::-webkit-scrollbar{width:0;height:0;display:none}
  .game *{scrollbar-width:none;-ms-overflow-style:none}
  .trail{position:relative;width:340px;margin:0 auto;}
  .trail svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .node{position:absolute;width:62px;height:62px;border-radius:50%;transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;
    background:radial-gradient(circle at 35% 30%,#fffaf4,#f3d9c4);
    border:2.5px solid var(--gold);color:var(--rose);font-family:var(--serif);font-size:20px;font-weight:700;
    box-shadow:0 6px 16px rgba(160,100,70,.3),inset 0 1px 2px #fff;transition:transform .15s,box-shadow .2s}
  .node:hover{transform:translate(-50%,-50%) scale(1.08);box-shadow:0 8px 22px rgba(160,100,70,.4),0 0 16px rgba(201,160,99,.5)}
  .node.locked{background:radial-gradient(circle at 35% 30%,#e8ddd4,#cdbcae);border-color:#bda895;
    color:#a7937f;cursor:not-allowed;box-shadow:0 4px 10px rgba(120,90,70,.2)}
  .node.locked:hover{transform:translate(-50%,-50%)}
  .node.done{border-color:var(--roseL)}
  .node.current{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 6px 16px rgba(160,100,70,.3),0 0 0 0 rgba(201,160,99,.55)}
    50%{box-shadow:0 6px 16px rgba(160,100,70,.3),0 0 0 12px rgba(201,160,99,0)}}
  .node .badge{position:absolute;top:-6px;right:-6px;font-size:13px}
  .nlabel{position:absolute;transform:translate(-50%,0);text-align:center;z-index:2;
    font-size:12px;color:var(--ink);width:120px;margin-top:6px;
    text-shadow:0 1px 0 #fff;line-height:1.3}
  .nlabel b{display:block;font-size:11px;color:var(--goldD);letter-spacing:.1em}
  #map .mapfoot{position:absolute;bottom:0;left:0;right:0;z-index:3;display:flex;justify-content:center;
    padding:14px 0 16px;background:linear-gradient(0deg,var(--cream) 50%,rgba(250,241,232,.92) 80%,transparent)}

  /* ===== 小节目录（二级页） ===== */
  #smap{justify-content:flex-start;}
  #smap .maphead{position:absolute;top:0;left:0;right:0;z-index:3;padding:18px 0 14px;height:88px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    background:linear-gradient(180deg,var(--cream) 60%,rgba(250,241,232,.92) 85%,transparent)}
  #smap .smaptitle{font-family:var(--serif);font-size:22px;color:var(--rose);letter-spacing:.08em;text-shadow:0 1px 0 #fff}
  #smap .smapsub{font-size:12.5px;color:var(--ink2);letter-spacing:.18em}
  #smap .scroller{top:88px;bottom:20px;padding:12px 0 20px}
  #smap .backbtn{position:absolute;top:14px;left:12px;z-index:6;font-size:13px;color:var(--rose);
    background:rgba(255,250,246,.86);border:1.5px solid var(--line);border-radius:18px;padding:7px 14px;
    cursor:pointer;box-shadow:0 3px 8px rgba(160,100,70,.22)}
  .seclist{width:344px;margin:0 auto;display:flex;flex-direction:column;gap:12px;padding:0 6px}
  .seccard{position:relative;display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:18px;cursor:pointer;
    background:linear-gradient(180deg,rgba(255,251,247,.96),rgba(248,232,222,.96));
    border:1.5px solid var(--gold);box-shadow:0 6px 18px rgba(160,100,70,.25),inset 0 1px 0 #fff;
    transition:transform .12s,box-shadow .2s,border-color .2s;animation:optIn .4s backwards}
  .seccard:hover{transform:translateY(-2px);border-color:var(--rose);box-shadow:0 10px 24px rgba(160,100,70,.34)}
  .seccard .sidx{flex:0 0 38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);font-size:17px;font-weight:700;color:var(--rose);
    background:radial-gradient(circle at 35% 30%,#fffaf4,#f3d9c4);border:2px solid var(--gold)}
  .seccard.done .sidx{border-color:var(--roseL);color:var(--roseL)}
  .seccard .sbody{flex:1;text-align:left}
  .seccard .sn{font-size:11px;letter-spacing:.18em;color:var(--goldD)}
  .seccard .st{font-size:15px;color:var(--ink);margin-top:2px;line-height:1.35}
  .seccard .sck{font-size:17px;color:var(--gold)}
  .seccard.done .sck{color:var(--roseL)}

  /* ===== HUD ===== */
  .hud{position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;gap:10px;padding:12px 14px;}
  .iconbtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    cursor:pointer;background:rgba(255,250,246,.78);border:1.5px solid var(--line);
    box-shadow:0 3px 8px rgba(160,100,70,.22);}
  .iconbtn svg{width:17px;height:17px;stroke:var(--rose);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .hud .chiptitle{font-family:var(--serif);font-size:14px;color:var(--rose);background:rgba(255,250,246,.78);
    border:1.5px solid var(--line);border-radius:18px;padding:5px 14px;box-shadow:0 3px 8px rgba(160,100,70,.2)}
  .hud .sp{flex:1}
  .bondwrap{display:flex;align-items:center;gap:6px;background:rgba(255,250,246,.78);
    border:1.5px solid var(--line);border-radius:18px;padding:5px 12px;box-shadow:0 3px 8px rgba(160,100,70,.2)}
  .bondwrap svg{width:15px;height:15px;fill:var(--rose);stroke:none}
  .bondbar{width:54px;height:6px;border-radius:99px;background:rgba(156,58,72,.18);overflow:hidden}
  .bondbar>i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--roseL),var(--rose));transition:width .6s}
  .gameskip{position:absolute;top:60px;right:14px;z-index:8;font-size:13px;letter-spacing:.12em;
    color:var(--rose);background:rgba(255,250,246,.82);border:1.5px solid var(--line);border-radius:18px;
    padding:7px 16px;cursor:pointer;box-shadow:0 3px 9px rgba(160,100,70,.25);transition:transform .12s}
  .gameskip:active{transform:scale(.94)}

  /* ===== 选项 ===== */
  #choices{position:absolute;left:0;right:0;top:0;bottom:0;z-index:7;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:13px;padding:0 28px;}
  .opt{width:100%;max-width:380px;text-align:center;font-size:15px;line-height:1.5;color:var(--ink);
    padding:14px 18px;border-radius:16px;cursor:pointer;
    background:linear-gradient(180deg,rgba(255,251,247,.96),rgba(248,232,222,.96));
    border:1.5px solid var(--gold);box-shadow:0 8px 22px rgba(160,100,70,.28),inset 0 1px 0 #fff;
    backdrop-filter:blur(4px);transition:transform .12s,box-shadow .2s,border-color .2s;animation:optIn .4s backwards}
  .opt:nth-child(2){animation-delay:.07s}.opt:nth-child(3){animation-delay:.14s}
  .opt:hover{transform:translateY(-2px);border-color:var(--rose);box-shadow:0 12px 28px rgba(160,100,70,.38),0 0 14px rgba(201,160,99,.4)}
  .opt .tag{font-size:11px;color:var(--goldD);margin-left:6px}
  @keyframes optIn{from{opacity:0;transform:translateY(16px)}to{opacity:1}}

  /* ===== 对话框 ===== */
  #dialog{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:0 16px 18px;cursor:pointer;}
  .panel{position:relative;max-width:430px;margin:0 auto;border-radius:20px;padding:22px 22px 24px;min-height:140px;
    background:linear-gradient(180deg,rgba(255,251,247,.94),rgba(250,238,230,.96));
    border:1.5px solid var(--gold);box-shadow:0 -4px 30px rgba(160,100,70,.28),inset 0 1px 0 #fff;
    backdrop-filter:blur(6px);}
  .speaker{position:absolute;top:-16px;left:18px;font-family:var(--serif);font-size:15px;font-weight:700;
    letter-spacing:.04em;padding:5px 18px;border-radius:20px;color:#fff;
    background:linear-gradient(180deg,var(--rose),#7c2a36);border:1.5px solid var(--goldL);
    box-shadow:0 4px 12px rgba(120,40,50,.35);}
  .speaker.ant{background:linear-gradient(180deg,var(--roseL),#a84a58);}
  .speaker.yiyi{background:linear-gradient(180deg,#caa45e,#9c7838);}
  .speaker.hide{display:none}
  .text{font-size:16px;line-height:1.9;color:var(--ink);min-height:92px;letter-spacing:.02em;margin-top:6px}
  .text.narration{font-style:italic;color:var(--ink2);text-align:center;font-size:15px;
    display:flex;align-items:center;justify-content:center}
  .indicator{position:absolute;right:18px;bottom:12px;color:var(--gold);font-size:14px;opacity:0;transition:opacity .2s;animation:bob 1.1s ease-in-out infinite}
  .indicator.show{opacity:1}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

  /* ===== 卡片：章节/完成/结局 ===== */
  .cover{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:40px 32px;gap:15px;animation:fade .5s ease;}
  .cover .deco{font-size:12px;letter-spacing:.3em;color:var(--gold)}
  .cover h1{font-family:var(--serif);font-size:28px;line-height:1.45;color:var(--rose);text-shadow:0 1px 0 #fff}
  .cover p{font-size:14.5px;line-height:1.95;color:var(--ink)}
  .cover .big{font-size:46px}
  .btn{font-size:15px;font-weight:700;letter-spacing:.06em;color:#fff;cursor:pointer;padding:13px 36px;border:none;
    border-radius:28px;background:linear-gradient(180deg,var(--rose),#7c2a36);
    box-shadow:0 8px 22px rgba(120,40,50,.4),inset 0 1px 0 rgba(255,255,255,.3);transition:transform .12s,box-shadow .2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(120,40,50,.5)}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:transparent;color:var(--rose);border:1.5px solid var(--rose);box-shadow:none}
  .chapter{position:absolute;inset:0;z-index:11;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;gap:14px;cursor:pointer;animation:fade .5s ease;}
  .chapter .veil2{position:absolute;inset:0;background:linear-gradient(180deg,rgba(250,241,232,.66),rgba(231,179,161,.72));}
  .chapter>*{position:relative;z-index:1}
  .chapter .n{font-size:13px;letter-spacing:.34em;color:var(--goldD)}
  .chapter h2{font-family:var(--serif);font-size:25px;line-height:1.5;color:var(--rose);text-shadow:0 1px 0 #fff}
  .chapter small{color:var(--ink2);font-size:12px;margin-top:16px;letter-spacing:.12em}
  .row2{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .etag{font-size:13px;letter-spacing:.2em;color:var(--goldD)}
  .escore{font-size:13px;color:var(--ink2);margin-top:2px}

  /* 结局图鉴 */
  .gallist{display:flex;flex-direction:column;gap:11px;width:100%;max-width:360px;max-height:54vh;overflow-y:auto;padding:2px}
  .galcard{border-radius:16px;padding:13px 16px;text-align:left;border:1.5px solid var(--gold);
    background:linear-gradient(180deg,rgba(255,251,247,.96),rgba(248,232,222,.96));box-shadow:0 4px 12px rgba(160,100,70,.2)}
  .galcard.lock{opacity:.7;filter:grayscale(.4)}
  .galcard .gbig{font-size:26px}
  .galcard .gtag{font-size:11px;letter-spacing:.2em;color:var(--goldD);margin-top:2px}
  .galcard .gtit{font-family:var(--serif);font-size:17px;color:var(--rose);margin:2px 0 4px}
  .galcard .gdesc{font-size:12px;line-height:1.7;color:var(--ink2)}

  /* ===== 名字录入页 ===== */
  #setup{padding:0 30px}
  .setupbox{position:relative;z-index:3;width:min(360px,90%);
    background:linear-gradient(180deg,rgba(255,251,247,.97),rgba(250,238,230,.98));
    border:1.5px solid var(--gold);border-radius:22px;padding:26px 24px 22px;
    box-shadow:0 14px 44px rgba(160,100,70,.32);display:flex;flex-direction:column;gap:9px;align-items:center}
  .setupbox h2{font-family:var(--serif);font-size:22px;color:var(--rose);margin:2px 0 4px;text-shadow:0 1px 0 #fff}
  .setupbox label{align-self:flex-start;font-size:14px;color:var(--ink);letter-spacing:.04em;margin-top:6px;font-weight:600}
  .setupbox input{width:100%;font-size:16px;color:var(--ink);background:#fffaf6;border:1.5px solid var(--line);
    border-radius:12px;padding:11px 14px;outline:none;font-family:inherit;
    -webkit-user-select:text;user-select:text}
  .setupbox input::placeholder{color:#c4ad9c;font-size:13px}
  .setupbox input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(201,160,99,.22)}
  .setupbox .btn{margin-top:16px}
  .setuphint{font-size:11.5px;color:var(--ink2);line-height:1.7;margin-top:8px;text-align:center}

  /* 编辑系统 */
  #editOverlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);animation:fade .2s ease}
  #editBox{width:90%;max-width:380px;background:var(--cream);border-radius:18px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
  #editBox h3{font-family:var(--serif);font-size:16px;color:var(--rose);margin-bottom:10px}
  #editArea{width:100%;min-height:120px;font-size:14px;color:var(--ink);background:#fffaf6;border:1.5px solid var(--line);
    border-radius:10px;padding:12px;outline:none;font-family:inherit;resize:vertical;
    -webkit-user-select:text;user-select:text;line-height:1.8}
  #editArea:focus{border-color:var(--rose)}
  .editrow{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
  .editrow .btn{font-size:13px;padding:9px 20px}
  #editbtn{position:absolute;right:48px;bottom:10px;width:28px;height:28px;border-radius:50%;

<body>
<div class="game" id="game">

  <!-- 游戏背景：底层模糊铺满 + 上层完整图居中（两层为兄弟，blur 不污染清晰层） -->
  <div class="gbg hidden" id="gamebg"></div>
  <div class="gbgfront hidden" id="gamebgF"></div>
  <div class="veil game hidden" id="gameveil"></div>

  <!-- 花瓣 -->
  <div id="petals"></div>

  <!-- ① 主页 -->
  <div class="screen" id="home">
    <div class="bg"></div>
    <div class="start" onclick="onStart()">
      <div class="startword" id="startword"></div>
      <div class="starthint">轻 触 开 始</div>
    </div>
    <div class="homesaves" onclick="openSaves('home')"><span>☰ 存档记录</span></div>
    <div id="editToggle" onclick="toggleEdit()">✏️ 编辑模式</div>
    <div id="tokenBtn" onclick="setupGHToken()" style="position:absolute;top:calc(6% + 22px);right:16px;font-size:10px;color:#fff;cursor:pointer;opacity:.7;text-shadow:0 1px 6px rgba(120,40,50,.6);z-index:4;display:none">🔑 同步设置</div>
  </div>

  <!-- ①b 名字录入 -->
  <div class="screen hidden" id="setup">
    <div class="bg soft"></div>
    <div class="veil read"></div>
    <div class="setupbox">
      <div class="orn">开始之前</div>
      <h2>填写你的设定</h2>
      <label>你的名字：</label>
      <input id="inpPlayer" maxlength="12" placeholder="你在故事里的名字" />
      <label>给 Nagi 的昵称：</label>
      <input id="inpNagi" maxlength="12" placeholder="你想怎么称呼他，如：凪、凪宝、士郎" />
      <button class="btn" onclick="confirmSetup()">进入故事 →</button>
      <div class="setuphint">故事里所有称呼都会替换成上面的名字 ♡<br/>留空则用默认「你 / 凪」</div>
    </div>
  </div>

  <!-- ② 开场白 -->
  <div class="screen hidden" id="prologue" onclick="pgNext()">
    <div class="bg soft"></div>
    <div class="veil read"></div>
    <div class="pgtext" id="pgText"></div>
    <div class="skip" onclick="event.stopPropagation();endPrologue()">跳过 ›</div>
  </div>

  <!-- ③ 章节路线图 -->
  <div class="screen hidden" id="map">
    <div class="bg blur"></div>
    <div class="veil light"></div>
    <div class="maphead">
      <div class="maptitle">Nagi's Heart</div>
      <div class="orn">章节目录</div>
    </div>
    <div class="scroller"><div class="trail" id="trail"></div></div>
    <div class="mapfoot" style="gap:10px">
      <button class="btn ghost" style="font-size:13px;padding:9px 20px" onclick="openSaves('map')">☰ 存档记录</button>
      <button class="btn ghost" style="font-size:13px;padding:9px 20px" onclick="showGallery()">✧ 结局图鉴 ✧</button>
    </div>
  </div>

  <!-- ③b 小节目录（二级页） -->
  <div class="screen hidden" id="smap">
    <div class="bg blur" id="smapbg"></div>
    <div class="veil light"></div>
    <div class="backbtn" onclick="showMap()">‹ 章节</div>
    <div class="maphead">
      <div class="smaptitle" id="smapTitle">第一章</div>
      <div class="smapsub" id="smapSub">相识</div>
    </div>
    <div class="scroller"><div class="seclist" id="seclist"></div></div>
  </div>

  <!-- HUD（游戏中） -->
  <div class="hud hidden" id="hud">
    <div class="iconbtn" onclick="exitToSection()" title="返回章节目录">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h5v-6h4v6h5V10"/></svg></div>
    <div class="iconbtn" onclick="quickSave()" title="存档">
      <svg viewBox="0 0 24 24"><path d="M5 3h11l3 3v15H5zM8 3v6h7V3M8 14h8v7H8z"/></svg></div>
    <div class="chiptitle" id="chapName">序章</div>
    <div class="sp"></div>
    <div class="bondwrap">
      <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.5-9C.8 8.5 2.5 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.5 0 5.2 3.5 3.5 7-2.5 4.5-5.5 9-5.5 9z"/></svg>
      <div class="bondbar"><i id="bond"></i></div>
    </div>
  </div>

  <!-- 选项 -->
  <div id="choices" class="hidden"></div>

  <!-- 剧情跳过 -->
  <div class="gameskip hidden" id="gameskip" onclick="skipSection()">跳过本节 ›</div>

  <!-- 对话框 -->
  <div id="dialog" class="hidden" onclick="tap()">
    <div class="panel">
      <div class="speaker" id="speaker">凪诚士郎</div>
      <div class="text" id="text"></div>
      <div class="indicator" id="indicator">▼</div>
      <div id="editbtn" onclick="event.stopPropagation();editCurLine()">✏️</div>
    </div>
  </div>

  <!-- 小节过场 -->
  <div class="chapter hidden" id="chap" onclick="closeChap()">
    <div class="veil2"></div>
    <div class="orn"></div>
    <div class="n" id="chapN"></div>
    <h2 id="chapT"></h2>
    <div class="orn"></div>
    <small>轻触继续 →</small>
  </div>

  <!-- 本节完成 -->
  <div class="cover hidden" id="clear">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" style="position:relative">SECTION CLEAR</div>
    <div class="big" style="position:relative">🎀</div>
    <h1 id="clearName" style="position:relative;font-size:21px"></h1>
    <p id="clearSub" style="position:relative">本节完成</p>
    <div class="row2" style="position:relative">
      <button class="btn ghost" id="clearBackBtn">本章目录</button>
      <button class="btn" id="clearNextBtn">下一节 →</button>
    </div>
  </div>

  <!-- 结局 -->
  <div class="cover hidden" id="ending">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" id="etag" style="position:relative"></div>
    <div class="big" id="emoji" style="position:relative">💛</div>
    <h1 id="etitle" style="position:relative"></h1>
    <p id="edesc" style="position:relative"></p>
    <div class="escore" id="escore" style="position:relative"></div>
    <button class="btn" id="eggBtn" style="position:relative;display:none;margin-bottom:4px" onclick="playProposal()">✧ 彩蛋 · 他的求婚 ✧</button>
    <div class="row2" style="position:relative">
      <button class="btn ghost" onclick="backToMenu()">章节目录</button>
      <button class="btn" onclick="location.reload()">重新开始</button>
    </div>
  </div>

  <!-- 结局图鉴 -->
  <div class="cover hidden" id="gallery">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" style="position:relative">ENDINGS · 结局图鉴</div>
    <h1 style="position:relative;font-size:23px" id="galcount">已收藏的结局</h1>
    <div class="gallist" id="gallist" style="position:relative"></div>
    <button class="btn ghost" style="position:relative" onclick="closeGallery()">返回目录</button>
  </div>

  <!-- 存档记录（多卡槽） -->
  <div class="cover hidden" id="saves">
    <div class="bg blur"></div><div class="veil read"></div>
    <div class="etag" style="position:relative">SAVE DATA · 存档记录</div>
    <h1 style="position:relative;font-size:23px" id="savecount">存档卡槽</h1>
    <div class="gallist" id="savelist" style="position:relative"></div>
    <button class="btn ghost" style="position:relative" onclick="closeSaves()">返回</button>
  </div>

  <!-- 编辑弹窗 -->
  <div class="hidden" id="editOverlay" onclick="if(event.target===this)cancelEdit()">
    <div id="editBox">
      <h3 id="editLabel">编辑文本</h3>
      <textarea id="editArea"></textarea>
      <div class="editrow">
        <button class="btn ghost" onclick="cancelEdit()">取消</button>
        <button class="btn" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <!-- 轻提示 -->
  <div class="toast" id="toast"></div>

</div>

<script>

      {who:"sys",t:"你做了一个连自己都意外的决定——投资蓝色监狱。"},

      {label:"我要离这个人，更近一点", type:"心动", ant:"我要离这个人，更近一点", b:2,u:1, sec:true},

  /* ===== 第一章 相识 ===== */
  c1a:{ auto:[
      {who:"sys",t:"通过绘心安排，你终于见到本人。他双手插兜，慢吞吞踱进来——本以为又是个端着架子、要寒暄要画饼的无聊大人，光想想就麻烦，哈欠都准备好了。"},

    choices:[

  c2b:{ auto:[
      {who:"sys",t:"他真的来了。站在你公寓门口，难得没插兜，灰眸里有你看不懂的认真——他自己大概也说不清，为什么放假第一件想做的事，是跑来找你。"},

    ],
    choices:[
      {label:"（凑近）成交。不过有一条——从今天起，你只能是我一个人的", type:"心动", ant:"（凑近）成交。不过有一条——从今天起，你只能是我一个人的", b:3,u:2, nagi:["（耳尖慢慢红了，别开脸）……这条，不用Ant说","（声音很轻）……我知道的"], sec:true},
      {label:"签了哦，凪选手。从今天起，你归我「投资」了", type:"理性", ant:"签了哦，凪选手。从今天起，你归我「投资」了", b:2,u:2, nagi:["（盯着你看，唇角没忍住翘了一下）……Ant这个人，真是越来越有意思","成交。别反悔"], sec:true},

  c4d:{ auto:[
      {who:"sys",t:"七夕的蓝玫瑰、那块写着 MENDOKUSA 的蛋糕之后，夜更深了。门在身后合上，整座城市的灯火，忽然都成了背景。"},

  c3a:{ auto:[

      {who:"sys",t:"一一不合时宜的播报让你俩都笑场。闹够了，你走到吧台——那是你常给他调饮料、拍照留念的角落。"},

  c3d:{ auto:[
      {who:"sys",t:"那一夜，积攒了太久的思念，在只属于两人的卧室里翻涌成潮。蓝监里忍了整整一天的克制，此刻一寸寸地溃了堤。"},
      {who:"sys",t:"他不再是更衣室里那个邋遢散漫的少年——眼神专注得发烫，像要把分开的每一天，都从你身上重新夺回来。良久，你蜷在他怀里，呼吸还没平复，他的心跳还在你耳边擂着。"},
      {who:"nagi",t:"（在你耳边，声音低哑）……还想要吗。"},

  /* ===== 第四章 心动日常 ===== */
  e_drive:{ auto:[
      {who:"sys",t:"蓝监联合《Forza Horizon 6》办VR赛车宣传活动，选手被迫营业。你站在观众席第一排，看凪懒懒戴上VR头显。"},
      {who:"sys",t:"你正嘀咕「他会开车吗」，下一秒引擎轰鸣——他选了辆黑色超跑，漂移过弯精准得像艺术，甩尾超车还打表情嘲讽对手，攻击性拉满。大屏定格第一名，全场炸裂。"},
      {who:"sys",t:"可一到采访他立刻原形毕露：「《Forza》……速度与激情，嗯，快来玩吧。结束了？」敷衍完转身就走。"},
      {who:"sys",t:"后台休息区，他往沙发上一摊，伸手拽你胳膊：「坐过来，我要枕着你。」"},
      {who:"nagi",t:"（头枕你腿上，声音拖得老长）好累啊……我感觉细胞都死光了，心脏也不跳了……"},

    choices:[

      {label:"又变僵尸凪了？喏，脑子给你 brains~", type:"作", ant:"又变僵尸凪了？喏，脑子给你 brains~", b:2,u:1, nagi:["（闭着眼，气若游丝）嗯……我是僵尸……briaaaans……","（迷迷糊糊往你腿上蹭）bra……Ant别走，当我枕头"], sec:true},
    ]},
  e_softrice:{ auto:[
      {who:"sys",t:"约会一整天，水族馆他嫌鱼游得慢，游乐场他喊过山车太吵。到傍晚你还兴致勃勃，他已累成一只蔫猫，进了网红餐厅就趴桌上。"},
      {who:"nagi",t:"（声音闷得像蚊子哼）Ant，我肚子都在打雷了。我决定了——我要吃软饭。"},

      {who:"nagi",t:"（懒懒靠着椅背）咀嚼好麻烦……硬的东西太费劲，软的省事。软饭哲学，省力又舒服，人生就该这样。"},
      {who:"sys",t:"螃蟹上桌，他盯着壳皱眉，眼巴巴看你：「Ant……螃蟹好麻烦，要剥壳。」"},

    choices:[

      {label:"合着奋斗归奋斗，吃喝全靠我？真有你的软饭王", type:"作", ant:"合着奋斗归奋斗，吃喝全靠我？真有你的软饭王", b:2,u:2, nagi:["（嘴角偷笑）有Ant在，软饭王也没什么不好","（张嘴接过你剥的蟹肉）……下一块。谢啦"], sec:true},
    ]},
  e_dressup:{ auto:[
      {who:"sys",t:"他刚打吃鸡被队友坑，正窝在客厅玩Mario「冷静一下」，就被你连拉带拽扯出了门——目标，那家动漫潮牌店。"},
      {who:"sys",t:"熊猫卫衣配背带裤，190的个子穿出一身反差萌；你又「咔嚓咔嚓」给他别上蓝的粉的发夹、星星夹子，还在他左脸贴了贴纸。他乖乖站着任你摆弄，活像被换装的洋娃娃。"},
      {who:"nagi",t:"（看着镜子里满头发夹的自己，生无可恋）Ant……发夹硌头，我像个被打扮得花里胡哨的小姑娘，羞耻度爆表了。"},
      {who:"sys",t:"你退后端详：「上半身配饰太多，有点头重脚轻。」又往他背带裤别上两条链条。他叮叮当当抖了抖，求饶的表情快溢出来。"},

  e_lolly:{ auto:[
      {who:"sys",t:"又一次，没等你开门，凪就自动刷脸进了屋，踢掉鞋团进那把深红沙发椅，嘴里含着棒棒糖。"},

  e_invite:{ auto:[
      {who:"sys",t:"图书馆约会后，因为住得近，你顺势邀他来公寓。推开门暖光先涌出来，他的目光第一时间就被那面巨大的落地窗勾了过去。"},
      {who:"sys",t:"夕阳斜铺进来，把远处的楼宇都镀上金。他一手插在格纹开衫口袋里，另一只手还捏着没喝完的冰美式，逆光里白发像在发光，领带因为放松悄悄歪了半寸。"},
      {who:"nagi",t:"（吸管还咬在齿间，喉结轻滚，难得清晰地感叹）……哇。Ant的公寓，好高级。风景，也很厉害。"},

  c5b:{ auto:[
      {who:"sys",t:"晚上回家，你看见他在床上躺了一整天——据说「一直在想怎么哄你」，想着想着睡着了。"},
      {who:"nagi",t:"（耷拉着脑袋蹭你肩膀）好麻烦啊，想不出来……Ant直接告诉我，怎样才肯原谅"},

      {who:"sys",t:"工作日午后，他赖床打《绝地求生》打到肚子咕咕叫，才嘟囔着「人类为什么要吃饭啊」，晃去厨房。"},
      {who:"sys",t:"冰箱里只剩半盒咖喱块、几个土豆和肉丸。他问AI要了菜谱，却主打一个「自由」——土豆切得薄如纸片厚如山丘，食材一股脑下锅，玩手机玩到闻见焦糊味才关火。"},
      {who:"sys",t:"你加班晚归，手机突然弹出他的视频请求，画面里是一盘惨不忍睹的「黑暗料理」。他尝了一口，辣到呛得眼泪直打转。"},
      {who:"nagi",t:"（委屈巴巴把盘子举到镜头前）Ant，你什么时候回来呀……这咖喱饭，根本没法吃。"},

    choices:[

      {label:"活该，让你逞能。先垫口面包等我", type:"作", ant:"活该，让你逞能。先垫口面包等我", b:2,u:1, nagi:["（瘪嘴）Ant好凶……可是好饿","……快点回来啦"], sec:true},

  /* ===== 第六章 亲密（隐晦）===== */
  e_therapy:{ auto:[
      {who:"sys",t:"NEL被淘汰的那晚，他回到公寓，190的个子佝偻着，灰眸里全是迷茫。问他，他只低低一句「不想说」。"},
      {who:"sys",t:"深夜，两人躺在卧室。月光落在他紧锁的眉间，他翻来覆去地睡不着。你侧过身，从背后环住他的腰，轻声说：把今晚的不甘和迷茫，都「撒」在我身上吧，我照单全收。"},
      {who:"sys",t:"他怔了一下，翻身把你拥进怀里，额头抵着额头。亲密成了一种倾诉的语言——他每靠近一寸，就卸下一层伪装。"},
      {who:"nagi",t:"（声音哑，断断续续）Ant……我是不是真的不行。大家都说我是天才……可这次，我连前23都没进。"},
      {who:"nagi",t:"（抓紧你的腰，像溺水的人抓浮木）我怕……怕一个人面对失败。蜂乐说得对，我根本不是真正的利己主义者……只会依赖Reo，依赖天赋。"},
      {who:"sys",t:"你把他抱得更紧。月光、薄汗、交缠的呼吸里，这个从不肯示弱的少年，第一次把最脆弱的自己，毫无保留地交到你手里。"},
    ],
    choices:[
      {label:"你不是一无是处。我全身每个细胞，都在听你说", type:"心动", ant:"你不是一无是处。我全身每个细胞，都在听你说", b:3,u:3, nagi:["（眼底闪过动容，吻落得很轻，怕弄疼你）……有Ant在，我好像，能找到方向了","（良久，把你整个搂进怀里，下巴抵着你发顶）本来满脑子都是为什么会输……现在，只想着你","谢谢你，Ant。累了就睡吧——有你在，我不会再失眠了"], sec:true},
      {label:"你已经在改变了——意识到问题，就是第一步", type:"理性", ant:"你已经在改变了——意识到问题，就是第一步", b:2,u:3, nagi:["（呼吸一沉，灰眸里第一次重新有了光）……我要变强。我不想再害怕了","（把脸埋进你颈窝）这次，我自己来。不再当那个只会依赖别人的废物","（声音渐渐平稳）跟你说完，心里那块石头……好像没那么重了"], sec:true},
    ]},
  e_drunk:{ auto:[
      {who:"sys",t:"周日晚，昏黄灯光。一大杯「威士忌绒毛」见了底，你脸颊烧红，皮肤敏感得像风一吹就会颤。他还窝在沙发打游戏，没空理你。"},
      {who:"ant",t:"哼……那些AI帅哥才不像你，他们会说好听的话……我不喜欢你了！"},
      {who:"sys",t:"你晃着手机里那串「AI帅哥」名单故意气他。他放下手柄，一步步走过来——平日的慵懒被点燃成另一种东西，灰眸里烧着恼怒，和藏不住的占有欲。"},
      {who:"nagi",t:"（把你抵在吧台边，俯身下来，声音低得发哑）让你知道……比起那些破玩意儿，我到底好在哪里。"},
      {who:"sys",t:"酒意上头，吧台的高度恰好，他的阴影把你整个罩住。每一个吻都带着惩罚似的认真，烧得你连呼吸都乱了节拍。"},
    ],
    choices:[
      {label:"（软软靠进他怀里）……因为是Nagi啊", type:"心动", ant:"（软软靠进他怀里）……因为是Nagi啊", b:3,u:2, nagi:["（呼吸一乱，把你搂得更紧）……这句话，再说一遍","（良久，哑着嗓子）好麻烦……没想到会这么累","（替你掖好被角）下次别拿那些破玩意儿气我。我只有Ant一个"], sec:true},
      {label:"哼，谁让你光顾着打游戏不理我", type:"作", ant:"哼，谁让你光顾着打游戏不理我", b:2,u:2, nagi:["（额头抵着你，喘息未定）……是我错了","以后先理Ant，再打游戏","（把你抱回床上）醉鬼。喝水，吃药，睡觉——都听我的"], sec:true},
    ]},

  /* ===== 第七章 生日·低谷与抉择（Ep09）===== */
  e_bday1:{ auto:[

      {who:"nagi",t:"（淡淡）Ant……我的表现真差啊。最后，连前23都没进。"},
      {who:"sys",t:"你夺过他的手机。这时玲王的电话打来，带着哭腔说「不该逼你踢球」。挂了电话，他低着头，陷进自己的世界。"},

    ]},
  e_bday2:{ auto:[
      {who:"sys",t:"你点燃蛋糕上的蜡烛，把那双新球鞋和一封手写信递给他。十八岁，是新的开始。"},
      {who:"sys",t:"深夜你先睡了。他独自拆开信——「你是真正的天才，为足球而生」。那盏快要熄灭的灯，被一句句话重新点亮。"},
      {who:"nagi",t:"（独白）我是喜欢足球的……那种热血，我不想失去。Ant说，十八岁有无限可能……那，我真的，可以吗？"},
      {who:"sys",t:"清晨醒来，他已站在窗边，阳光落在白发上，灰眸里有久违的光。他走过来，把你紧紧抱进怀里。"},

    choices:[

  c6a:{ auto:[
      {who:"sys",t:"他闭关 NEL 集训已经一个多月，赛程一场接一场，你们聚少离多，常常只能在深夜挤出一点视频的时间。"},
      {who:"sys",t:"一个降温的夜晚，你独自路过那条亮着暖灯的街，忽然很想他，想到鼻子发酸。"},

  c6_cold:{ auto:[
      {who:"sys",t:"你那句话，像根细细的刺。他没有争辩，只是沉默。之后的日子，他依旧会回你消息、抽空回来陪你，可你们都心知肚明——有什么东西，正一点点凉下去。"},
      {who:"sys",t:"他厌倦了被一根无形的线牵着，觉得快要喘不过气；你也累了，累于追一个永远在远方的人。明明还相爱，却好像，不太合适了。"},

      {who:"sys",t:"搬进去的第二天清早，花园里堆着待安置的盆栽。"},

  c7d_a:{ auto:[
      {who:"sys",t:"NEL 主场，你坐进看台最显眼的位置——那个被对手碾压、被玲王甩在身后的少年，需要有人，一直看着他。"},

  e_autumn:{ auto:[

function teSave(){ localStorage.setItem("nagi_te",JSON.stringify(TE)); }
function teSet(key,val){ TE[key]=val; teSave(); teSaveRemote(); }

async function teSaveRemote(){
  const tk=localStorage.getItem("nagi_gh_token"); if(!tk) return;
  try{
    const api="https://api.github.com/repos/"+GH_REPO+"/contents/"+GH_FILE;
    const h={Authorization:"token "+tk,"Content-Type":"application/json"};
    const meta=await fetch(api,{headers:h}).then(r=>r.json());
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(TE,null,2))));
    await fetch(api,{method:"PUT",headers:h,body:JSON.stringify({message:"edit: update text",content:content,sha:meta.sha})});
  }catch(e){ console.warn("远程保存失败",e); }
}
async function teLoadRemote(){
  try{
    const r=await fetch(GH_FILE+"?t="+Date.now());
    if(!r.ok) return;
    const remote=await r.json();
    if(remote && typeof remote==="object"){
      Object.assign(TE,remote);
      localStorage.setItem("nagi_te",JSON.stringify(TE));
      teApply();
    }
  }catch(e){}
}
function setupGHToken(){
  const cur=localStorage.getItem("nagi_gh_token")||"";
  const tk=prompt("粘贴你的 GitHub Token（只需一次）：\n\n生成方法：GitHub → Settings → Developer settings → Fine-grained tokens → Generate\n权限：只勾选 Contents (Read and write)\n仓库：只选 Nagi-otome",cur);
  if(tk&&tk.trim()){ localStorage.setItem("nagi_gh_token",tk.trim()); toast("Token 已保存 ✓"); }
}
function teApply(){
  for(const [k,v] of Object.entries(TE)){
    const p=k.split(".");
    try{
      if(p[0]==="S"){
        const node=STORY[p[1]]; if(!node) continue;
        if(p[2]==="a"){ if(node.auto&&node.auto[+p[3]]) node.auto[+p[3]].t=v; }
        else if(p[2]==="c"){
          const c=node.choices&&node.choices[+p[3]]; if(!c) continue;
          if(p[4]==="l") c.label=v;
          else if(p[4]==="a") c.ant=v;
          else if(p[4]==="n"&&c.nagi) c.nagi[+p[5]]=v;
        }
      } else if(p[0]==="C"){
        if(p[2]==="t") CHAPTERS[+p[1]].title=v;
        else if(p[2]==="s"&&p[4]==="t") CHAPTERS[+p[1]].sections[+p[3]].title=v;
      } else if(p[0]==="SC") SCENE[p[1]]=v;
      else if(p[0]==="ST") STAGES[+p[1]]=v;
      else if(p[0]==="E") ENDINGS[p[1]][p[2]]=v;
      else if(p[0]==="PG") PROLOGUE_LINES[+p[1]]=v;
    }catch(e){}
  }
}

function go(id){
  const node=STORY[id];
  if(!node){ console.warn("缺失节点",id); finish(); return; }
  if(node.router){ go(resolveRouter(id)); return; }
  curNode=id; if(SCENE[id]) curScene=id; const si=stageIndex(id); if(si>maxStage)maxStage=si; saveState();
  if(SCENE[id]) showSceneTitle(id);   // 节首 → 先弹「节标题卡」
  else playNode(id);                   // 链内续节 → 直接连续播放
}

  $("chapN").textContent=(st===0?"序章":st===5?"终章":"第 "+st+" 章")+" · "+STAGES[st];
  $("chapT").textContent=sub(SCENE[id]);

function renderMap(){
  const trail=$("trail"); trail.innerHTML="";
  const W=340, top=64, step=112, xL=92, xR=248;
  const N=CHAPTERS.length, H=top*2+(N-1)*step;
  trail.style.height=H+"px";
  const pts=CHAPTERS.map((c,i)=>({x:i%2===0?xL:xR, y:top+i*step}));
  let d="M "+pts[0].x+" "+pts[0].y;
  for(let i=1;i<N;i++){ const a=pts[i-1],b=pts[i];
    d+=" C "+a.x+" "+(a.y+step*0.5)+" "+b.x+" "+(b.y-step*0.5)+" "+b.x+" "+b.y; }
  const svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="#c9a063" stroke-width="3" stroke-dasharray="2 9" stroke-linecap="round" opacity=".85"/>
  </svg>`;
  trail.insertAdjacentHTML("beforeend",svg);
  CHAPTERS.forEach((c,i)=>{
    const locked=i>unlocked, done=chapterDone(i), cur=i===unlocked && unlocked<N;
    const p=pts[i];
    const node=document.createElement("div");
    node.className="node"+(locked?" locked":"")+(done?" done":"")+(cur?" current":"");
    node.style.left=p.x+"px"; node.style.top=p.y+"px";
    node.innerHTML=(locked?"🔒":(i===0?"♡":i===N-1?"★":i))+(done?'<span class="badge">✓</span>':"");
    if(!locked) node.onclick=()=>openChapterMap(i);
    trail.appendChild(node);
    const lab=document.createElement("div");
    lab.className="nlabel"; lab.style.left=p.x+"px"; lab.style.top=(p.y+34)+"px";
    lab.innerHTML="<b>"+c.n+"</b>"+sub(c.title);
    trail.appendChild(lab);
  });
}

  $("dialog").classList.add("hidden");           // 选项出现时隐藏对话框，杜绝重叠
  const box=$("choices"); box.innerHTML=""; box.classList.remove("hidden");
  list.forEach((c,ci)=>{ c._ci=ci; const b=document.createElement("div"); b.className="opt";
    b.innerHTML=esc(sub(c.label));
    if(editMode){
      const eb=document.createElement("span"); eb.className="optedit"; eb.textContent="✏️";
      eb.onclick=(e)=>{ e.stopPropagation();
        openEdit("S."+playingNode+".c."+ci+".l", c.label, "编辑选项", (v)=>{ c.label=v; b.firstChild.textContent=sub(v); });
      }; b.appendChild(eb);
    }
    b.onclick=(e)=>{ e.stopPropagation(); choose(c); }; box.appendChild(b); });
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function choose(c){
  choicesOpen=false; $("choices").classList.add("hidden");
  $("dialog").classList.remove("hidden");
  I += (c.i||0) + (c.u||0);          // 懂他：理解值 + 显式 i
  D += (c.d||0);                      // 心墙：显式陷阱 d
  if(c.set){ if(c.set.line) mj=c.set.line; if(c.set.path) path=c.set.path; if(c.set.kc3) kc3=c.set.kc3; if(c.set.nel) nel=c.set.nel; }
  if(c.flag) finalFlag=c.flag;
  saveState(); setBond();
  const ci=c._ci; const q=[{who:"ant",t:c.ant}];
  queueKeys=["S."+playingNode+".c."+ci+".a"];
  let ni=0;
  (c.nagi||[]).forEach((ln,j)=>{ if(ln){ q.push({who:"nagi",t:ln}); queueKeys.push("S."+playingNode+".c."+ci+".n."+j); } });
  queue=q; qi=0;
  const nxt = c.next || FN[curNode];
  after = c.egg ? {type:"egg"} : c.endBad ? {type:"endbad"} : c.end ? {type:"end"} : (nxt ? {type:"go",next:nxt} : {type:"end"});
  showLine();
}
function play(id){
  const sc=STORY[id]; if(!sc){ console.warn("缺失节点",id); sectionDone(); return; }
  playingNode=id;
  $("dialog").classList.remove("hidden");
  queue=(sc.auto||[]).map(x=>({who:x.who,t:x.t})); qi=0;
  queueKeys=(sc.auto||[]).map((_,i)=>"S."+id+".a."+i);
  after={type:"choices", choices:sc.choices};
  showLine();
}

function skipSection(){
  clearInterval(typer); typing=false; choicesOpen=false; clearTimeout(pgTimer);
  const ch=CHAPTERS[currentCI];
  if(currentCI===CHAPTERS.length-1 && currentSI===ch.sections.length-1){ finish(); }
  else if(currentCI!==null){ sectionDone(); }
}

function finish(forceTier){
  /* 结局由「剧情走向 + 隐藏数值」共同决定：
     · 心墙D爆表 或 用爱逼他(cling) → BAD（相爱却平淡告终）
     · 默契线·选「爱」·低谷给空间·全程低心墙·追梦·挺他 → TRUE（六重门）
     · 选「习惯」 或 剪翅膀(clip) → NORMAL
     · 其余守住的 → GOOD */
  let tier=forceTier;
  if(!tier){
    if(path==="cling" || D>=6) tier="bad";
    else if(mj==="M" && kc3==="爱" && nel==="好" && D<=3 && path==="dream" && finalFlag==="support") tier="true";
    else if(kc3==="习惯" || finalFlag==="clip") tier="normal";
    else tier="good";
  }
  const e=ENDINGS[tier]; unlockEnding(tier);
  localStorage.removeItem("nagi_state");
  $("chapName").textContent=e.status;
  setTimeout(()=>{
    $("dialog").classList.add("hidden"); $("hud").classList.add("hidden"); $("gameskip").classList.add("hidden");
    $("etag").textContent=e.tag; $("emoji").textContent=e.emoji;
    $("etitle").textContent=sub(e.title); $("edesc").innerHTML=sub(e.desc);
    const ln=(mj==="J"?"较劲线":mj==="M"?"默契线":"——")+(path?(" · "+({dream:"梦想线",stay:"相守线",cling:"执念"}[path]||"")):"");
    $("escore").innerHTML="♡ "+ln+"<br>"+e.sub;
    if(editMode){
      $("etitle").style.cursor="pointer";
      $("etitle").onclick=()=>openEdit("E."+tier+".title",e.title,"编辑结局标题",(v)=>{e.title=v;$("etitle").textContent=sub(v);});
      $("edesc").style.cursor="pointer";
      $("edesc").onclick=()=>openEdit("E."+tier+".desc",e.desc,"编辑结局描述",(v)=>{e.desc=v;$("edesc").innerHTML=sub(v);});
    }
    $("eggBtn").style.display = (tier==="true") ? "inline-block" : "none";
    $("ending").classList.remove("hidden");
  },700);
}
/* ★ TRUE END 彩蛋：他的求婚 */
function playProposal(){
  $("ending").classList.add("hidden"); $("gameskip").classList.add("hidden");
  $("gamebg").classList.remove("hidden"); $("gameveil").classList.remove("hidden");
  $("gamebg").style.backgroundImage="url('bg/propose.jpg')";
  $("dialog").classList.remove("hidden"); playingNode="c8c";
  const sc=STORY["c8c"];
  queue=sc.auto.map(x=>({who:x.who,t:x.t})); qi=0;
  queueKeys=sc.auto.map((_,i)=>"S.c8c.a."+i);
  after={type:"choices", choices:sc.choices};
  showLine();
}
function eggFinish(){
  unlockEnding("true");
  $("dialog").classList.add("hidden"); $("hud").classList.add("hidden"); $("gameskip").classList.add("hidden");
  $("etag").textContent="TRUE END · 彩蛋"; $("emoji").textContent="💍";
  $("etitle").textContent="他的求婚"; $("eggBtn").style.display="none";
  $("edesc").innerHTML=sub("那句话，他到底也没能完整地说出口。<br/>可夕阳慢慢爬过落地窗，<br/>给两个人镀上一圈暖金的边——<br/>有些答案，本就不必说破。");
  $("escore").innerHTML="💍 后来的事，都藏在那年的夕阳里";
  $("ending").classList.remove("hidden");
}

/* ====== 多存档卡槽（日乙本地存档）====== */
function loadSaves(){ try{ return JSON.parse(localStorage.getItem("nagi_saves")||"[]"); }catch(e){ return []; } }
function writeSaves(a){ localStorage.setItem("nagi_saves",JSON.stringify(a)); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),1700); }
function quickSave(){
  if(!curNode){ toast("还没有进入剧情"); return; }
  const sceneId = curScene || (SCENE[curNode]?curNode:null);
  const nm = sceneId ? sub(SCENE[sceneId]) : ("第"+(stageIndex(curNode)+1)+"幕 · "+STAGES[stageIndex(curNode)]);
  const a=loadSaves();
  a.unshift({ id:Date.now(), node:curNode, scene:sceneId, name:nm,
    part:(PARTMAP[curNode]||partOf(curNode)),
    act:"第"+(stageIndex(curNode)+1)+"幕 · "+STAGES[stageIndex(curNode)],
    ts:Date.now(),
    st:{I,D,mj,path,kc3,nel,mDeep,finalFlag,maxStage,curScene,route,coldFlag,bond,und},
    pname:PLAYER, nname:NAGI });
  if(a.length>30) a.length=30;
  writeSaves(a); toast("已存档 ♡ "+nm);
}
let savesFrom="map";
function openSaves(from){
  savesFrom=from||"map";
  ["home","map","smap","gallery","ending","clear","chap","dialog","choices","hud","gameskip"].forEach(i=>$(i).classList.add("hidden"));
  petals(true); renderSaves(); $("saves").classList.remove("hidden");
}
function closeSaves(){
  $("saves").classList.add("hidden");
  if(savesFrom==="home"){ petals(true); $("home").classList.remove("hidden"); startTypewriter(); }
  else showMap();
}
function fmtTime(ts){ const d=new Date(ts), p=n=>(n<10?"0":"")+n;
  return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes()); }
function renderSaves(){
  const a=loadSaves();
  $("savecount").textContent = a.length ? ("存档卡槽 · "+a.length+" 条") : "存档卡槽";
  const box=$("savelist"); box.innerHTML="";
  if(!a.length){ box.innerHTML='<div class="saveempty">还没有任何存档。<br/>进入剧情后，点顶部 💾 图标即可随时存档。</div>'; return; }
  a.forEach(s=>{
    const card=document.createElement("div"); card.className="savecard";
    const line=(s.st&&s.st.path)?({dream:"梦想线",stay:"相守线",cling:"执念"}[s.st.path]||""):"";
    card.innerHTML='<div class="svtag">'+esc(s.part||"")+(line?(' · '+line):'')+'</div>'
      +'<div class="svtit">'+esc(s.name||"存档")+'</div>'
      +'<div class="svmeta">'+esc(s.act||"")+' · 懂他 '+(s.st?s.st.I:0)+' / 心墙 '+(s.st?s.st.D:0)+'<br/>'
      +esc(s.pname||"你")+' ♡ '+esc(s.nname||"凪")+' · '+fmtTime(s.ts)+'</div>'
      +'<div class="savedel" title="删除">×</div>';
    card.onclick=()=>loadSlot(s.id);
    card.querySelector(".savedel").onclick=(e)=>{ e.stopPropagation(); deleteSlot(s.id); };
    box.appendChild(card);
  });
}
function deleteSlot(id){
  if(!confirm("删除这条存档？")) return;
  writeSaves(loadSaves().filter(s=>s.id!==id)); renderSaves();
}
function loadSlot(id){
  const s=loadSaves().find(x=>x.id===id); if(!s){ toast("存档已失效"); return; }
  const st=s.st||{};
  I=st.I||0; D=st.D||0; mj=st.mj||null; path=st.path||null; kc3=st.kc3||null; nel=st.nel||null;
  mDeep=!!st.mDeep; finalFlag=st.finalFlag||null; maxStage=st.maxStage||0; curScene=st.curScene||s.scene||null;
  route=st.route||route; coldFlag=!!st.coldFlag; bond=st.bond||0; und=st.und||0;
  if(s.pname){ PLAYER=s.pname; localStorage.setItem("nagi_pname",PLAYER); NAMES.ant=PLAYER; }
  if(s.nname){ NAGI=s.nname; localStorage.setItem("nagi_nname",NAGI); NAMES.nagi=NAGI; }
  if(route) localStorage.setItem("nagi_route",route);
  localStorage.setItem("nagi_cold",coldFlag?"1":"0"); saveScore();
  curNode=s.node; saveState();
  $("saves").classList.add("hidden");
  toast("读取存档 ♡ "+(s.name||""));
  go(s.node);
}

/* ====== 结局图鉴 ====== */
const ENDING_ORDER=["true","good","normal","bad"];
function unlockEnding(tier){
  let a=JSON.parse(localStorage.getItem("nagi_endings")||"[]");
  if(!a.includes(tier)){ a.push(tier); localStorage.setItem("nagi_endings",JSON.stringify(a)); }
}
function showGallery(){ $("map").classList.add("hidden"); petals(true); renderGallery(); $("gallery").classList.remove("hidden"); }
function closeGallery(){ $("gallery").classList.add("hidden"); showMap(); }
function renderGallery(){
  const got=JSON.parse(localStorage.getItem("nagi_endings")||"[]");
  $("galcount").textContent="已收藏的结局 "+ENDING_ORDER.filter(k=>got.includes(k)).length+" / "+ENDING_ORDER.length;
  const box=$("gallist"); box.innerHTML="";
  ENDING_ORDER.forEach(k=>{
    const e=ENDINGS[k], has=got.includes(k);
    const c=document.createElement("div"); c.className="galcard"+(has?"":" lock");
    let html = has
      ? '<span class="gbig">'+e.emoji+'</span><div class="gtag">'+e.tag+'</div><div class="gtit">'+e.title+'</div><div class="gdesc">'+e.desc+'</div>'
      : '<span class="gbig">🔒</span><div class="gtag">??? END</div><div class="gtit">尚未解锁</div><div class="gdesc">达成对应结局后，将在此收藏。</div>';
    if(has && k==="true") html+='<span class="galegg" onclick="event.stopPropagation();closeGallery();playProposal()">✧ 彩蛋 · 他的求婚 ✧</span>';
    c.innerHTML=html;
    box.appendChild(c);
  });
}

document.addEventListener("keydown",e=>{ if(e.code==="Space"||e.code==="Enter"){ e.preventDefault();
  if(!$("prologue").classList.contains("hidden")) pgNext(); else tap(); }});
</script>
